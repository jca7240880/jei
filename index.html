  const html=`<!doctype html><html><head><meta charset="utf-8"><title>${def.label} 보고서</title>
  <style>@page{size:A4 landscape;margin:12mm}body{font-family:'Malgun Gothic',sans-serif;color:#000}
  h1{text-align:center;font-size:19px;margin:0 0 4px}.info{text-align:right;font-size:12px;margin-bottom:10px}
  table{width:100%;border-collapse:collapse;font-size:11.5px}th,td{border:1px solid #000;padding:5px 6px}th{background:#eee}
  tfoot td{font-weight:bold;background:#f5f5f5}</style></head><body>
  <h1>제이컴퓨터학원 ${def.label} 현황 보고서</h1>
  <div class="info">조회 기간: ${period} &nbsp;|&nbsp; 총 ${list.length}건 &nbsp;|&nbsp; 출력일: ${todayStr()}</div>
  <table>
    <thead><tr><th style="width:4%">No</th>${def.cols.map(c=>`<th>${c[1]}</th>`).join("")}</tr></thead>
    <tbody>${rows||`<tr><td colspan="${def.cols.length+1}" style="text-align:center">해당 기간 등록 항목 없음</td></tr>`}</tbody>
    ${key!=="facilities"&&list.length?`<tfoot><tr><td colspan="${def.cols.length}" style="text-align:right">취득액 합계</td><td style="text-align:right">${won(totPrice)}원</td></tr></tfoot>`:""}
  </table>
  <script>window.onload=function(){window.print();}<\/script></body></html>`;
  const w=window.open("","_blank");
  if(!w){alert("팝업이 차단되었습니다. 팝업 허용 후 다시 시도하세요.");return;}
  w.document.write(html);w.document.close();
}

  return `<div style="display:flex;gap:5px;justify-content:center;margin-top:10px;flex-wrap:wrap">${b}</div>`;

/* ───── 미분류 한번에 정리 (거래처별 그룹) ───── */
let CLEAN_GROUPS=[]; // [{kind,vendor,ids:[..]}] onclick 이스케이프 문제 회피용
function cleanupPanelHtml(kind){
  const isInc=kind==="inc";
  const list=isInc?DB.income:DB.expense;
  const defBig=isInc?"기타수입":"기타지출";
  const CAT=isInc?getIncCat():getExpCat();
  const bigs=Object.keys(CAT);
  // 미분류 = 기본값 그대로인 항목 (전체 월 대상)
  const un=list.filter(l=>l.big===defBig&&l.acct==="기타");
  if(!un.length)return `<div class="panel"><h2>🧹 미분류 한번에 정리</h2><div class="empty">미분류 항목이 없습니다. 전부 정리됐습니다! 👍</div>
    <p style="text-align:center"><button class="btn sm" onclick="ui.${kind}Cleanup=false;render()">닫기</button></p></div>`;
  // 거래처(없으면 적요)별 그룹
  const groups={};
  un.forEach(l=>{
    const key=String(l.vendor||"").trim()||String(l.desc||"").trim()||"(거래처 없음)";
    (groups[key]=groups[key]||[]).push(l);
  });
  CLEAN_GROUPS=Object.keys(groups).sort((a,b)=>groups[b].length-groups[a].length)
    .map(k=>({kind,vendor:k,ids:groups[k].map(l=>l.id)}));
  const amtOf=l=>isInc?Number(l.amount)||0:(Number(l.paidAmount)||Number(l.amount)||0);
  const rows=CLEAN_GROUPS.map((g,i)=>{
    const items=groups[g.vendor];
    const total=items.reduce((a,l)=>a+amtOf(l),0);
    const dates=items.map(l=>String(l.date)).sort();
    const period=dates[0].slice(5)+(dates.length>1?"~"+dates[dates.length-1].slice(5):"");
    return `<tr>
      <td style="text-align:left"><b>${esc(g.vendor)}</b><br><span style="font-size:11px;color:var(--sub)">${items.length}건 · ${period}</span></td>
      <td style="text-align:right">${won(total)}원</td>
      <td><select id="cln_big_${i}" onchange="cleanFillAcct('${kind}',${i})">${bigs.map(b=>`<option>${esc(b)}</option>`).join("")}</select></td>
      <td><select id="cln_acct_${i}">${(CAT[bigs[0]]||[]).map(a=>`<option>${esc(a)}</option>`).join("")}</select></td>
      <td><button class="btn sm" onclick="cleanApply(${i})">✓ 적용</button></td>
    </tr>`;
  }).join("");
  return `<div class="panel" style="border:2px solid var(--green)"><h2><span>🧹 미분류 한번에 정리 <span style="font-size:13px;color:var(--sub)">— 전체 기간 미분류 ${un.length}건을 거래처별로 묶었습니다. 한 줄씩 분류하면 그 거래처의 모든 건이 한번에 바뀝니다.</span></span>
    <button class="btn sm" onclick="ui.${kind}Cleanup=false;render()">닫기</button></h2>
    <div class="twrap" style="border:none"><table><thead><tr><th style="text-align:left">거래처 (건수·기간)</th><th>합계</th><th>대분류</th><th>계정과목</th><th></th></tr></thead>
    <tbody>${rows}</tbody></table></div>
    <p class="note">※ 건수 많은 거래처가 위에 있습니다. ✓ 적용을 누르면 즉시 저장되고, 다음 은행 가져오기부터 그 거래처는 자동 분류됩니다.</p>
  </div>`;
}
function cleanFillAcct(kind,i){
  const CAT=kind==="inc"?getIncCat():getExpCat();
  const big=val("cln_big_"+i);
  const sel=document.getElementById("cln_acct_"+i);
  if(sel&&CAT[big])sel.innerHTML=CAT[big].map(a=>`<option>${esc(a)}</option>`).join("");
}
function cleanApply(i){
  const g=CLEAN_GROUPS[i];if(!g)return;
  const big=val("cln_big_"+i),acct=val("cln_acct_"+i);
  const list=g.kind==="inc"?DB.income:DB.expense;
  g.ids.forEach(id=>{const l=list.find(x=>String(x.id)===String(id));if(l){l.big=big;l.acct=acct;}});
  save();render();
}

/* 과거 내역에서 거래처·적요 → 대분류·계정과목 학습 (최근 분류 우선) */
function classMapOf(list, defBig){
  const byVendor={},byDesc={};
  list.forEach(l=>{
    if(!l.big||!l.acct)return;
    if(l.big===defBig&&l.acct==="기타")return; // 미분류 상태는 학습하지 않음
    const v=String(l.vendor||"").trim(), d=String(l.desc||"").trim();
    if(v)byVendor[v]={big:l.big,acct:l.acct};
    if(d)byDesc[d]={big:l.big,acct:l.acct};
  });
  return {byVendor,byDesc};
}
function importBank(input){
  const file=input.files&&input.files[0];
  input.value="";
  if(!file)return;
  if(typeof XLSX==="undefined"){alert("엑셀 기능을 불러오지 못했습니다. 인터넷 연결 상태에서 다시 시도하세요.");return;}
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const wb=XLSX.read(new Uint8Array(e.target.result),{type:"array"});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const aoa=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
      // 헤더 행 찾기: '거래일시'와 '입금'이 있는 행
      let hi=-1;
      for(let i=0;i<aoa.length;i++){
        const row=aoa[i].map(x=>String(x));
        if(row.some(c=>c.includes("거래일"))&&row.some(c=>c.includes("입금"))){hi=i;break;}
      }
      if(hi<0){alert("은행 거래내역 형식을 인식하지 못했습니다.\n'거래일시·출금액·입금액' 열이 있는 거래내역 파일인지 확인하세요.");return;}
      const head=aoa[hi].map(x=>String(x).trim());
      const col=names=>{for(const n of names){const idx=head.findIndex(h=>h.includes(n));if(idx>=0)return idx;}return -1;};
      const cDate=col(["거래일시","거래일자","거래일"]),cWho=col(["보낸분","받는분","의뢰인","거래처","적요내용"]),cOut=col(["출금"]),cIn=col(["입금"]),cMemo=col(["메모","내통장","통장표시"]),cDesc=col(["적요"]);
      const parseNum=v=>Number(String(v).replace(/[^0-9.-]/g,""))||0;
      const parseDate=v=>{const mt=String(v).match(/(\d{4})\D+(\d{1,2})\D+(\d{1,2})/);return mt?`${mt[1]}-${("0"+mt[2]).slice(-2)}-${("0"+mt[3]).slice(-2)}`:"";};
      let incCnt=0,expCnt=0,dupCnt=0,autoCnt=0;const newInc=[],newExp=[];
      // 과거 분류 학습 (같은 거래처·적요면 자동으로 같은 분류 적용)
      const incMap=classMapOf(DB.income,"기타수입"), expMap=classMapOf(DB.expense,"기타지출");
      const autoClass=(map,who,d)=>map.byVendor[String(who||"").trim()]||map.byDesc[String(d||"").trim()]||null;
      // 중복 판정용 키: 날짜|적요|거래처|금액 (기존 데이터 + 이번에 추가될 데이터 모두 비교)
      const keyOf=(date,desc,vendor,amount)=>`${normDate(date)}|${String(desc).trim()}|${String(vendor).trim()}|${amount}`;
      const existIncKeys=new Set(DB.income.map(l=>keyOf(l.date,l.desc,l.vendor,Number(l.amount))));
      const existExpKeys=new Set(DB.expense.map(l=>keyOf(l.date,l.desc,l.vendor,Number(l.paidAmount||l.amount))));
      for(let i=hi+1;i<aoa.length;i++){
        const r=aoa[i];if(!r||!r.length)continue;
        const dt=parseDate(r[cDate]);if(!dt)continue;
        const inAmt=cIn>=0?parseNum(r[cIn]):0;
        const outAmt=cOut>=0?parseNum(r[cOut]):0;
        const who=cWho>=0?String(r[cWho]||"").trim():"";
        const memo=cMemo>=0?String(r[cMemo]||"").trim():"";
        const desc=cDesc>=0?String(r[cDesc]||"").trim():"";
        if(inAmt>0){
          const d=desc||memo||"은행입금";
          const k=keyOf(dt,d,who,inAmt);
          if(existIncKeys.has(k)){dupCnt++;continue;} // 이미 있는 항목 건너뜀
          existIncKeys.add(k);
          const ac=autoClass(incMap,who,d);if(ac)autoCnt++;
          newInc.push({id:uid(),date:dt,big:ac?ac.big:"기타수입",acct:ac?ac.acct:"기타",desc:d,vendor:who,memo:memo,amount:inAmt,method:"계좌이체",note:"은행내역 자동등록"});incCnt++;
        }
        else if(outAmt>0){
          const d=desc||memo||"은행출금";
          const k=keyOf(dt,d,who,outAmt);
          if(existExpKeys.has(k)){dupCnt++;continue;}
          existExpKeys.add(k);
          const ac=autoClass(expMap,who,d);if(ac)autoCnt++;
          newExp.push({id:uid(),date:dt,big:ac?ac.big:"기타지출",acct:ac?ac.acct:"기타",desc:d,vendor:who,memo:memo,amount:outAmt,discount:0,paidAmount:outAmt,method:"계좌이체",note:"은행내역 자동등록"});expCnt++;
        }
      }
      if(!incCnt&&!expCnt){

function isEditingNow(){
  if(ui.salesFullEditId||ui.salesEditId||ui.incEditId||ui.expEditId||ui.leadEditId||ui.rowEditId||ui.editStu||ui.showStuForm||ui.showBulk)return true;
  const ae=document.activeElement;
  if(ae&&(ae.tagName==="INPUT"||ae.tagName==="SELECT"||ae.tagName==="TEXTAREA"))return true;
  return false;
}
setInterval(()=>{
  if(KIOSK)return;
  if(!GAS||!LOADED_OK)return;
  if(PENDING_SAVE||SAVING)return;
  if(isEditingNow())return;
  if(document.visibilityState!=="visible")return;
  loadCloud(true);
}, 15000);
