<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>제이컴퓨터학원 통합관리시스템 v4</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --green:#196B24; --green-dark:#114A19; --green-light:#E8F3EA; --green-mid:#CDE5D1;
    --ink:#1E2421; --sub:#5A6660; --line:#DDE5DF; --bg:#F6F8F6; --white:#fff;
    --red:#C0392B; --red-light:#FBEAE8; --amber:#B7791F; --amber-light:#FBF3E4;
    --purple:#5B4B9E; --purple-light:#EDEAF6;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'Pretendard','Malgun Gothic','맑은 고딕',sans-serif;font-size:14px;}
  .topbar{position:sticky;top:0;z-index:100;}
  header{background:var(--green);color:#fff;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
  header .brand small{display:block;font-size:11px;letter-spacing:3px;opacity:.85;}
  header h1{margin:2px 0 0;font-size:20px;font-weight:800;}
  .hbtns{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
  .hbtn{background:#fff;color:var(--green);border:none;border-radius:8px;padding:8px 14px;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit;}
  .hbtn.ghost{background:transparent;color:#fff;border:1px solid rgba(255,255,255,.55);}
  #syncBadge{font-size:12px;background:rgba(255,255,255,.18);border-radius:20px;padding:6px 12px;}
  nav{display:flex;gap:2px;padding:0 18px;background:#fff;border-bottom:1px solid var(--line);overflow-x:auto;}
  nav button{padding:13px 14px;border:none;background:none;cursor:pointer;font-size:14px;color:var(--sub);border-bottom:3px solid transparent;white-space:nowrap;font-family:inherit;}
  nav button.on{color:var(--green);font-weight:800;border-bottom-color:var(--green);}
  main{max-width:1240px;margin:0 auto;padding:22px;} body.kioskbody main{max-width:none;padding:0;}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(165px,1fr));gap:12px;}
  .card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px 16px;}
  .card .lab{font-size:12px;color:var(--sub);}
  .card .val{font-size:20px;font-weight:800;color:var(--green);margin-top:5px;}
  .card .val.neg{color:var(--red);}
  .panel{background:#fff;border:1px solid var(--line);border-radius:12px;padding:18px;margin-top:16px;}
  .panel h2{margin:0 0 14px;font-size:15px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;}
  .bar-row{display:flex;align-items:center;gap:10px;margin-bottom:9px;}
  .bar-row .nm{width:120px;font-size:13px;}
  .bar-track{flex:1;background:var(--green-light);border-radius:6px;height:18px;overflow:hidden;}
  .bar-fill{background:var(--green);height:100%;border-radius:6px;transition:width .3s;}
  .bar-row .ct{width:80px;text-align:right;font-weight:700;font-size:12px;}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:flex-end;}
  input,select,textarea{padding:9px 11px;border:1px solid var(--line);border-radius:8px;font-size:13px;font-family:inherit;background:#fff;}
  label.fld{display:flex;flex-direction:column;gap:4px;font-size:12px;color:var(--sub);}
  .btn{background:var(--green);color:#fff;border:none;border-radius:8px;padding:9px 16px;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit;}
  .btn.sm{padding:5px 10px;font-size:12px;font-weight:500;background:#fff;color:var(--sub);border:1px solid var(--line);}
  .btn.red{background:var(--red);}
  .formbox{background:var(--green-light);border:1px solid var(--green-mid);border-radius:12px;padding:14px;margin-bottom:14px;display:grid;grid-template-columns:repeat(auto-fit,minmax(135px,1fr));gap:10px;align-items:end;}
  table{width:100%;border-collapse:collapse;font-size:12.5px;}
  th{background:var(--green-light);color:var(--green-dark);text-align:left;padding:9px 10px;border-bottom:1px solid var(--line);white-space:nowrap;}
  td{padding:8px 10px;border-bottom:1px solid var(--line);white-space:nowrap;}
  .twrap{overflow:auto;background:#fff;border:1px solid var(--line);border-radius:12px;max-height:640px;}
  .twrap thead th{position:sticky;top:0;z-index:2;}
  .pill{display:inline-block;border:none;border-radius:20px;padding:4px 11px;font-size:11.5px;font-weight:700;}
  .subtabs{display:flex;gap:6px;margin-bottom:14px;border-bottom:2px solid var(--line);padding-bottom:0}
  .subtab{background:none;border:none;border-bottom:3px solid transparent;padding:9px 16px;font-size:14px;font-weight:600;color:var(--sub);cursor:pointer;font-family:inherit;margin-bottom:-2px}
  .subtab.on{color:var(--green);border-bottom-color:var(--green)}
  .subtab:hover{color:var(--green-dark)}
  .btn.on{background:var(--green);color:#fff;border-color:var(--green);}
  .duepill{display:inline-block!important;width:64px!important;text-align:center!important;padding:4px 0!important;border:none!important;font-size:11.5px!important;line-height:1.4!important;border-radius:20px!important;box-sizing:border-box;}
  .pill.ok{background:var(--green-light);color:var(--green);}
  .pill.no{background:var(--red-light);color:var(--red);}
  .pill.warn{background:var(--amber-light);color:var(--amber);}
  .pill.pu{background:var(--purple-light);color:var(--purple);}
  .empty{padding:26px;text-align:center;color:var(--sub);}
  .note{font-size:12px;color:var(--sub);margin-top:10px;}
  .lesson-card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:10px;}
  .lesson-card .top{display:flex;justify-content:space-between;flex-wrap:wrap;gap:6px;font-size:12px;color:var(--sub);}
  .lesson-card .body{margin-top:7px;font-size:13px;white-space:pre-wrap;}
  .tag{background:var(--green-light);color:var(--green);border-radius:6px;padding:2px 8px;font-size:11px;font-weight:700;}
  .tag.red{background:var(--red-light);color:var(--red);}
  .tag.pu{background:var(--purple-light);color:var(--purple);}
  .namelink{color:var(--green-dark);font-weight:700;cursor:pointer;text-decoration:underline;text-underline-offset:3px;}
  /* 키오스크 */
  .kiosk{max-width:430px;margin:0 auto;text-align:center;background:#fff;border:1px solid var(--line);border-radius:16px;padding:30px 24px;}
  .kiosk input{font-size:34px;text-align:center;letter-spacing:12px;width:230px;padding:12px;}
  .kiosk .msg{margin-top:16px;font-size:16px;font-weight:700;min-height:24px;}
  .kiosk .choice{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:12px;}
  /* 캘린더 */
  .cal{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
  .cal .dow{text-align:center;font-size:11px;color:var(--sub);font-weight:700;padding:4px 0;}
  .cal .day{background:var(--bg);border:1px solid var(--line);border-radius:8px;min-height:64px;padding:4px 6px;font-size:11px;overflow:hidden;}
  .cal .day .dn{font-weight:800;font-size:11px;}
  .cal .day.today{border:2px solid var(--green);background:var(--green-light);}
  .cal .day .ev{background:var(--green);color:#fff;border-radius:4px;padding:1px 4px;margin-top:2px;white-space:normal;word-break:break-all;font-size:10px;line-height:1.35;}
  .cal .day.off{opacity:.35;}
  /* 차트 */
  .legend{display:flex;gap:14px;font-size:12px;margin-bottom:8px;}
  .legend i{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:4px;vertical-align:middle;}
  .chart{display:flex;gap:6px;align-items:flex-end;height:190px;padding:6px 2px 0;border-bottom:1px solid var(--line);}
  .chart .grp{flex:1;display:flex;gap:2px;align-items:flex-end;height:100%;}
  .chart .b{flex:1;border-radius:3px 3px 0 0;transition:height .3s;cursor:default;}
  .chart-x{display:flex;gap:6px;font-size:10px;color:var(--sub);text-align:center;margin-top:4px;}
  .chart-x div{flex:1;}
  /* 상세 페이지 */
  .detail-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;}
  .detail-grid .item{background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:10px 12px;}
  .detail-grid .item .k{font-size:11px;color:var(--sub);}
  .detail-grid .item .v{font-size:14px;font-weight:700;margin-top:3px;}
  /* 마법사 */
  .wizard{max-width:760px;margin:0 auto;}
  .step{background:#fff;border:1px solid var(--line);border-radius:12px;padding:18px 20px;margin-bottom:14px;}
  .step h3{margin:0 0 10px;font-size:15px;color:var(--green-dark);}
  .step .num{display:inline-block;background:var(--green);color:#fff;border-radius:50%;width:24px;height:24px;text-align:center;line-height:24px;font-size:13px;font-weight:800;margin-right:8px;}
  .step p,.step li{font-size:13px;line-height:1.7;margin:6px 0;}
  .step code{background:var(--green-light);padding:2px 6px;border-radius:4px;font-size:12px;}
  .codebox{background:#10231A;color:#D7E8DB;border-radius:10px;padding:14px;font-size:11.5px;max-height:200px;overflow:auto;white-space:pre;font-family:Consolas,monospace;margin-top:8px;}
  .warn{background:var(--amber-light);border:1px solid #E8D3A8;border-radius:10px;padding:12px 14px;font-size:13px;line-height:1.7;}
  .mini-table th,.mini-table td{font-size:12px;padding:6px 8px;text-align:right;}
  .mini-table th:first-child,.mini-table td:first-child{text-align:left;}
  .mgr{background:var(--bg);border:1px dashed var(--line);border-radius:10px;padding:12px;margin-bottom:12px;}
  .mgr .chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
  .dgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(42px,1fr));gap:6px;margin:10px 0;}
  .dbtn{border:1px solid var(--line);background:#fff;border-radius:8px;padding:9px 0;font-size:13px;cursor:pointer;font-family:inherit;color:var(--ink);}
  .dbtn.sel{border:2px solid var(--amber);background:var(--amber-light);color:var(--amber);font-weight:800;}
  .dbtn.done{border:2px solid var(--green);background:var(--green-light);color:var(--green);font-weight:800;cursor:default;}
  .wlcell{width:100%;min-width:220px;border:1px solid transparent;background:transparent;resize:vertical;padding:6px 8px;font-size:13px;border-radius:6px;min-height:32px;}
  .wlcell:hover{border-color:var(--line);background:#fff;}
  .wlcell:focus{border-color:var(--green);background:#fff;outline:none;}
  /* 키오스크 전체화면 */
  .kioskfull{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;background:#fff;color:var(--ink);padding:24px;position:relative;}
  .klock{position:absolute;top:14px;right:14px;background:var(--bg);color:var(--sub);border:1px solid var(--line);border-radius:8px;padding:7px 13px;font-size:12px;cursor:pointer;font-family:inherit;}
  .khead{margin-bottom:8px;}
  .klogo{margin-bottom:10px;min-height:70px;display:flex;align-items:center;justify-content:center;}
  .klogo img{max-height:70px;max-width:240px;object-fit:contain;}
  .kmono{width:66px;height:66px;border-radius:16px;background:var(--green);color:#fff;font-size:24px;font-weight:900;display:flex;align-items:center;justify-content:center;letter-spacing:1px;}
  .kdots{display:flex;gap:12px;justify-content:center;margin:8px 0 4px;}
  .kdot{width:52px;height:62px;border:2px solid var(--line);border-radius:12px;font-size:32px;font-weight:800;display:flex;align-items:center;justify-content:center;background:var(--bg);color:var(--ink);}
  .kdot.on{border-color:var(--green);background:var(--green-light);color:var(--green-dark);}
  .kmsg{min-height:28px;font-size:18px;font-weight:700;margin:6px 0;color:var(--green);}
  .kpad{display:grid;grid-template-columns:repeat(3,86px);gap:12px;margin-top:6px;}
  .kkey{height:72px;font-size:26px;font-weight:700;border:1px solid var(--line);border-radius:14px;background:#fff;color:var(--ink);cursor:pointer;font-family:inherit;box-shadow:0 1px 3px rgba(0,0,0,.06);}
  .kkey:active{background:var(--green-light);transform:scale(.97);}
  .kkey.del{background:var(--bg);color:var(--sub);font-size:18px;}
  .kkey.go{background:var(--green);border:none;color:#fff;font-size:20px;}
  .kbig{font-size:24px;font-weight:800;padding:28px 40px;border-radius:18px;border:none;cursor:pointer;font-family:inherit;min-width:150px;box-shadow:0 2px 8px rgba(0,0,0,.12);}
  .kbig.in{background:var(--green);color:#fff;}
  .kbig.out{background:var(--red);color:#fff;}
  .kbig:active{transform:scale(.96);}
  @media (max-width:420px){ .kpad{grid-template-columns:repeat(3,30vw);} .kkey{height:64px;} .kdot{width:46px;height:56px;} }
  .chip{background:#fff;border:1px solid var(--line);border-radius:20px;padding:4px 10px;font-size:12px;display:inline-flex;align-items:center;gap:6px;}
  .chip b{cursor:pointer;color:var(--red);}
  @media (max-width:640px){ main{padding:14px;} .kiosk input{width:190px;font-size:28px;} }
</style>
</head>

<!-- ▼ 구글 Apps Script에 붙여넣을 코드 (v4) -->
<script type="text/plain" id="gascode">
// 제이컴퓨터학원 통합관리시스템 — 구글 시트 연동 코드 (v4: 출결시간·수강생상세·업무일지·캘린더)
const SHEET_DEF = {
  students: ['수강생명부', ['id','성명','연락처','구분','보호자연락처','생년월일','학교','학년','성별','담임','과정명','등록일','수강료','결제방식','주기개월','등록횟수','최근결제일','상태','참고사항','누적충전','수업요일','퇴원일']],
  attendance: ['출결기록', ['id','수강생ID','수강생명','일자','입실','퇴실','비고']],
  income: ['수입내역', ['id','일자','대분류','계정과목','적요','거래처','메모','금액','수단','비고']],
  expense: ['지출내역', ['id','일자','대분류','계정과목','적요','지출처','메모','금액','할인','결제금액','수단','비고']],
  sales: ['일별매출상세', ['id','날짜','결제수단','결제금액','구분','성명','과정명','수강료','할인','카드사','승인번호','입금일','입금액','수수료','비고','결제방식','결제주기']],
  bookin: ['도서구입내역', ['id','입고일','과목','구입처','교재명','정가','구입가','권수','입고금액','비고']],
  bookout: ['도서지급내역', ['id','출고일','성명','교재명','단가','권수','출고금액','비고']],
  courses: ['과정목록', ['id','과정명']],
  methods: ['결제수단', ['id','구분','수단명']],
  worklogs: ['업무일지', ['id','일자','작성자','내용']],
  consults: ['상담기록', ['id','수강생ID','일자','내용']],
  settings: ['설정', ['id','키','값']],
  courselogs: ['과정변경이력', ['id','수강생ID','일자','이전과정','변경과정']],
  facilities: ['시설관리대장', ['id','점검일','시설명','면적','용도','점검주기','점검결과','보수이력','담당자']],
  supplies: ['비품관리대장', ['id','점검일','비품명','규격모델','수량','단위','취득일','취득단가','보관위치','관리번호','점검결과','처분일','담당자','비고']],
  materials: ['기자재관리대장', ['id','점검일','기자재명','관리번호','제조사','규격모델','수량','단위','취득일','취득단가','보관위치','내용연수','점검결과','보수이력','처분일','비고']],
  equipments: ['장비관리대장', ['id','점검일','장비명','관리번호','제조사','규격모델','CPU','RAM','저장장치','그래픽','OS','취득일','취득가액','위치','점검결과','보수이력','처분일','비고']],
  inspections: ['점검보수이력', ['id','점검일','구분','대상명칭','관리번호','내용','점검자','비용','처리결과','차기점검일','비고']],
  lessons: ['학습지도', ['id','일자','과정명','수강생','지도내용']],
  leads: ['상담문의', ['id','상담일','성명','연락처','문의경로','관심과정','상담내용','상태','재연락일','담당자','등록전환수강생ID','비고']],
  schedules: ['시간표', ['id','요일','시작시간','종료시간','과정명','강사','강의실','비고']],
  makeups: ['보강관리', ['id','결석일','수강생','과정명','보강예정일','보강시간','강사','상태','비고']],
  meetings: ['회의록', ['id','일자','제목','참석자','내용','결정사항','작성자']]
};

function doGet(){ return out(loadAll()); }

function doPost(e){
  const body = JSON.parse(e.postData.contents || '{}');
  if(body.action === 'calendar'){ return out(getCalendar(body.year, body.month)); }
  const lock = LockService.getScriptLock();
  lock.waitLock(10000);
  try{
    if(body.action === 'addAtt' && body.att){
      // 출결 한 건만 시트에 추가/수정 (다른 데이터는 절대 건드리지 않음)
      // 패드(키오스크)와 PC가 충돌 없이 공존하기 위한 전용 경로
      var a = body.att;
      var def = SHEET_DEF['attendance'];
      var sh = sheet(def[0], def[1]);
      var data = sh.getDataRange().getValues();
      var hdrLen = def[1].length;
      // 같은 수강생ID + 같은 날짜 행을 찾아서 입실/퇴실만 갱신
      var foundRow = -1;
      for(var i=1;i<data.length;i++){
        var rsid = String(data[i][1]||'');
        var rdate = dstr(data[i][3]);
        if(rsid===String(a.sid) && rdate===dstr(a.date)){ foundRow=i+1; break; }
      }
      if(foundRow>0){
        if(a.inTime){ var c5=sh.getRange(foundRow,5); c5.setNumberFormat('@'); c5.setValue(a.inTime); }
        if(a.outTime){ var c6=sh.getRange(foundRow,6); c6.setNumberFormat('@'); c6.setValue(a.outTime); }
      }else{
        var newRow=sh.getLastRow()+1;
        sh.appendRow([a.id, a.sid, a.name||'', a.date, a.inTime||'', a.outTime||'', a.memo||'']);
        // 입실·퇴실 칸을 텍스트로 고정해 "14:30"이 시간값으로 변환되는 것 방지
        sh.getRange(newRow, 5, 1, 2).setNumberFormat('@');
        if(a.inTime) sh.getRange(newRow,5).setValue(a.inTime);
        if(a.outTime) sh.getRange(newRow,6).setValue(a.outTime);
      }
      return out({ok:true, att:true});
    }
    if(body.action === 'save' && body.db){
      // ── 동시 편집 충돌 감지: 혼자 사용 시 오작동 위험이 커서 비활성화 ──
      // (stamp는 참고용으로만 기록하고, 저장을 막지는 않음)
      // ── 안전장치: 데이터가 전부 비거나, 큰 폭으로 급감하면 덮어쓰기 거부 ──
      const guardKeys = ['sales','students','income','expense'];
      for(var gi=0; gi<guardKeys.length; gi++){
        var gk = guardKeys[gi];
        var incoming = (body.db[gk]||[]).length;
        var existing = countValid(gk);
        if(incoming === 0 && existing > 0){
          return out({ok:false, blocked:true, reason:gk+' 0건 저장 차단(기존 '+existing+'건 보존)'});
        }
        if(!body.force && existing >= 10 && incoming < existing*0.7){
          return out({ok:false, blocked:true, reason:gk+' 대폭 감소 차단(기존 '+existing+'건 → '+incoming+'건). 의도한 정리면 [취소]로 강제 저장'});
        }
      }
      autoBackup();
      saveAll(body.db);
      var newStamp = String(new Date().getTime());
      PropertiesService.getDocumentProperties().setProperty('lastSaveStamp', newStamp);
      return out({ok:true, stamp:newStamp});
    }
    return out(loadAll());
  } finally { lock.releaseLock(); }
}

function getCalendar(y, m){

function countValid(key){
  // 클라이언트 loadAll과 동일한 판정 기준으로 유효 행 수를 셈
  var data = rows(key), n = 0;

}

function ensureIds(){
  // 시트에 직접 입력해 id(A열)가 빈 행에 서버가 id를 채워줌 (시트에 바로 기록)
  Object.keys(SHEET_DEF).forEach(function(key){

    var sh=sheet(def[0],def[1]);
    var last=sh.getLastRow();
    if(last<2)return;
    var idRange=sh.getRange(2,1,last-1,1);
    var ids=idRange.getValues();
    var seen={};
    var changed=false;
    for(var i=0;i<ids.length;i++){
      var v=String(ids[i][0]||'');
      // 그 행에 실제 데이터가 있는지 (2번째 열 기준)
      var dataCell=sh.getRange(i+2,2).getValue();
      if(String(dataCell||'')==='')continue; // 빈 행은 건너뜀
      if(!v||seen[v]){ v='r'+new Date().getTime()+Math.floor(Math.random()*100000); ids[i][0]=v; changed=true; }
      seen[v]=true;
    }
    if(changed){ idRange.setNumberFormat('@'); idRange.setValues(ids); }
  });
}

function autoBackup(){
  try{
    var ss=SpreadsheetApp.getActiveSpreadsheet();
    var targets=['일별매출상세','수강생명부','수입내역','지출내역'];
    for(var t=0;t<targets.length;t++){
      var src=ss.getSheetByName(targets[t]);
      if(!src||src.getLastRow()<2)continue;
      var bkName='_백업_'+targets[t];
      var bk=ss.getSheetByName(bkName);
      if(bk)ss.deleteSheet(bk);
      bk=src.copyTo(ss);
      bk.setName(bkName);
      bk.hideSheet();
    }

function S(v){ return String(v == null ? '' : v); }
function N(v){ return Number(v) || 0; }
function dstr(v){
  if(v instanceof Date) return Utilities.formatDate(v, 'Asia/Seoul', 'yyyy-MM-dd');
  var str = S(v).trim();
  if(!str) return '';
  // "2026. 6. 13", "2026-6-13", "2026/06/13", "2026.6.13" 등 → 2026-06-13
  var mt = str.match(/(\d{4})\D+(\d{1,2})\D+(\d{1,2})/);
  if(mt){
    var y=mt[1], mo=('0'+mt[2]).slice(-2), d=('0'+mt[3]).slice(-2);
    return y+'-'+mo+'-'+d;
  }
  return str;
}
function tstr(v){
  // 출결 시간을 "HH:MM"으로 정규화. 시트가 시간을 Date나 소수로 바꿔도 복구
  if(v instanceof Date) return Utilities.formatDate(v, 'Asia/Seoul', 'HH:mm');
  var str = S(v).trim();
  if(!str) return '';
  // 이미 "14:30" 형태면 그대로
  var hm = str.match(/(\d{1,2}):(\d{2})/);
  if(hm) return ('0'+hm[1]).slice(-2)+':'+hm[2];
  // 소수(시간의 분수 표현, 예: 0.604166)면 시:분으로 환산
  var num = Number(str);
  if(!isNaN(num) && num>=0 && num<1){
    var total = Math.round(num*24*60);
    var h = Math.floor(total/60), m = total%60;
    return ('0'+h).slice(-2)+':'+('0'+m).slice(-2);
  }
  return str;
}
function out(obj){
  return ContentService.createTextOutput(JSON.stringify(obj)).setMimeType(ContentService.MimeType.JSON);
}

function toSupaRow(table, r){
  const o={...r};
  if((table==="income"||table==="expense") && "desc" in o){ o.desc_txt=o.desc; delete o.desc; }
  // 스키마에 없는 필드는 제거 (구버전 잔여 필드로 인한 400 오류 원천 차단)
  const allow=SUPA_COLS[table];
  if(allow){ Object.keys(o).forEach(k=>{ if(!allow.includes(k)) delete o[k]; }); }
  return o;
}
function fromSupaRow(table, r){
  const o={...r};
  if((table==="income"||table==="expense") && "desc_txt" in o){ o.desc=o.desc_txt; delete o.desc_txt; }
  delete o.created_at;
  return o;
}
function supaHeaders(){
  return {
    "apikey": SUPA_KEY,
    "Authorization": "Bearer "+SUPA_KEY,
    "Content-Type": "application/json",
    "Prefer": "return=minimal"
  };

async function supaFetchTable(table){
  // 최대 10000행씩 페이지네이션 (Supabase 기본 상한 1000이지만 range로 확장)
  const all=[];
  const pageSize=1000;
  let from=0;
  while(true){
    const url=GAS.replace(/\/+$/,'')+"/rest/v1/"+table+"?select=*&order=created_at.asc";
    const h={...supaHeaders(), "Range-Unit":"items", "Range":`${from}-${from+pageSize-1}`};
    delete h["Content-Type"]; delete h["Prefer"];
    const res=await fetch(url, {headers:h});
    if(!res.ok) throw new Error(table+" "+res.status);
    const rows=await res.json();
    rows.forEach(r=>all.push(fromSupaRow(table,r)));
    if(rows.length<pageSize)break;
    from+=pageSize;
    if(from>50000)break; // 안전 상한
  }
  return all;
}

// Supabase 저장 헬퍼 — 테이블별 upsert(있으면 업데이트, 없으면 삽입)
async function supaUpsertTable(table, rows){
  if(!rows.length)return;
  // 같은 배치 내 id 중복 제거 (Postgres upsert 제약)
  const seen=new Set();
  const unique=[];
  rows.forEach(r=>{
    let id=String(r.id||"");
    if(!id||seen.has(id)){
      // id 없거나 중복이면 새로 생성
      id="a"+Date.now().toString(36)+Math.floor(Math.random()*1e6);
      r.id=id;
    }
    seen.add(id);
    unique.push(r);
  });
  const url=GAS.replace(/\/+$/,'')+"/rest/v1/"+table+"?on_conflict=id";
  const h={...supaHeaders(), "Prefer":"resolution=merge-duplicates,return=minimal"};
  // 모든 행을 동일한 필드 구성으로 정규화 (없는 값은 null) — PGRST102 "keys must match" 방지
  const allow=SUPA_COLS[table];
  const payload=unique.map(r=>{
    const o=toSupaRow(table,r);
    if(!allow)return o;
    const norm={};
    allow.forEach(k=>{norm[k]=(o[k]===undefined?null:o[k]);});
    return norm;
  });
  const res=await fetch(url,{method:"POST",headers:h,body:JSON.stringify(payload)});
  if(!res.ok){
    const t=await res.text();
    throw new Error(table+" upsert "+res.status+" "+t);
  }
}
// id 목록으로 서버 행 삭제
async function supaDeleteIds(table, toDelete){
  const chunk=100;
  for(let i=0;i<toDelete.length;i+=chunk){
    const ids=toDelete.slice(i,i+chunk).map(id=>`"${String(id).replace(/"/g,'')}"`).join(",");
    const durl=GAS.replace(/\/+$/,'')+"/rest/v1/"+table+"?id=in.("+encodeURIComponent(ids)+")";
    const dh={...supaHeaders(),"Prefer":"return=minimal"};
    delete dh["Content-Type"];
    await fetch(durl,{method:"DELETE",headers:dh});
  }
}
// 서버에만 있고 클라이언트엔 없는 행 삭제 (복원 전용 — 복원본이 유일 기준일 때만 사용)
async function supaDeleteMissing(table, clientIds){
  const url=GAS.replace(/\/+$/,'')+"/rest/v1/"+table+"?select=id";
  const h={...supaHeaders()};
  delete h["Content-Type"]; delete h["Prefer"];
  const res=await fetch(url,{headers:h});
  if(!res.ok)return; // 조회 실패 시 삭제 스킵 (안전)
  const serverRows=await res.json();
  const clientSet=new Set(clientIds.map(String));
  const toDelete=serverRows.map(r=>String(r.id)).filter(id=>!clientSet.has(id));
  if(!toDelete.length)return;
  // in.() 필터로 여러 개 한번에 삭제
  const chunk=100;
  for(let i=0;i<toDelete.length;i+=chunk){
    const ids=toDelete.slice(i,i+chunk).map(id=>`"${id.replace(/"/g,'')}"`).join(",");
    const durl=GAS.replace(/\/+$/,'')+"/rest/v1/"+table+"?id=in.("+encodeURIComponent(ids)+")";
    const dh={...supaHeaders(),"Prefer":"return=minimal"};
    delete dh["Content-Type"];
    await fetch(durl,{method:"DELETE",headers:dh});
  }
}

function lastPaidOf(s){
  if(s.status==="퇴원")return ""; // 퇴원자는 공란

  const sameName=DB.students.filter(x=>String(x.name||"").trim()===nm&&x.status!=="퇴원");

  let latest="";
  DB.sales.forEach(l=>{
    if(String(l.name||"").trim()!==nm)return;
    if(needCourse){
      const lc=String(l.course||"").trim();
      if(lc&&co&&lc!==co)return;

    const d=normDate(l.date);
    if(d>latest)latest=d;
  });

  return latest;
}

/* 다음 결제 정보 */
function autoChargedFromSales(s){
  // 매출상세에서 성명(+과정) 일치하며 결제방식=횟수제인 건의 충전횟수 합계
  // 결제금액이 음수(환불)면 충전횟수도 차감으로 처리
  let sum=0;
  const nm=String(s.name||"").trim(),co=String(s.course||"").trim();
  const needCourse=hasNamesake(nm);
  DB.sales.forEach(l=>{
    if(String(l.name||"").trim()!==nm)return;
    if(needCourse){const lc=String(l.course||"").trim();if(lc&&co&&lc!==co)return;}
    if(l.payType==="횟수제"){
      let cnt=Number(l.payCycle)||0;
      // 환불(결제금액 음수)인데 충전횟수가 양수로 적혔으면 음수로 차감
      if(Number(l.paidAmount)<0&&cnt>0)cnt=-cnt;
      sum+=cnt;
    }
  });
  return sum;
}
function latestSaleOf(s){
  // 성명(+과정) 일치하는 매출 중 가장 최근 결제건
  let best=null,bestD="";
  const nm=String(s.name||"").trim(),co=String(s.course||"").trim();
  const needCourse=hasNamesake(nm);
  DB.sales.forEach(l=>{
    if(String(l.name||"").trim()!==nm)return;
    if(needCourse){const lc=String(l.course||"").trim();if(lc&&co&&lc!==co)return;}
    const d=normDate(l.date);
    if(!best||d>bestD){best=l;bestD=d;}
  });
  return best;
}
function effPayType(s){
  // 결제방식: 매출 최근건 우선, 없으면 수강생 설정
  const ls=latestSaleOf(s);
  if(ls&&ls.payType)return ls.payType;
  return s.payCycle||"";
}
function chargedTotal(s){
  const auto=autoChargedFromSales(s);
  const manual=Number(s.charged)||0;
  // 자동 산출이 있으면 우선, 없으면 수동/등록값
  return auto>0?auto:(manual||Number(s.totalSessions)||0);
}
function nextDueInfo(s){
  const eType=effPayType(s); // 매출 우선, 없으면 수강생 설정
  if(eType==="횟수제"){
    const charged=chargedTotal(s);
    const att=DB.attendance.filter(a=>String(a.sid)===String(s.id));
    const used=att.length;
    const remain=charged-used;
    let proj=null,dday=null;
    const map={"일":0,"월":1,"화":2,"수":3,"목":4,"금":5,"토":6};
    const want=String(s.classDays||"").split(",").map(x=>map[x.trim()]).filter(x=>x!==undefined);
    if(want.length){
      const lastAtt=att.map(a=>String(a.date)).sort().pop()||"";
      const baseStr=lastAtt>todayStr()?lastAtt:todayStr();
      let cur=new Date(baseStr+"T00:00:00");
      let need=Math.max(remain,0)+1;
      for(let i=0;i<370&&need>0;i++){
        cur.setDate(cur.getDate()+1);
        if(want.includes(cur.getDay()))need--;
      }
      if(need===0){
        proj=ymd(cur);
        dday=Math.ceil((cur-new Date(todayStr()+"T00:00:00"))/86400000);
      }
    }
    return {type:"count",remain,used,charged,proj,dday};
  }
  // 기간제: 매출 최근건의 결제일 + 결제주기(개월). 매출에 주기 있으면 그것 우선
  const ls=latestSaleOf(s);
  const base=(ls&&ls.date)||lastPaidOf(s)||s.start;
  if(!base)return {type:"none"};
  let months=Number(s.cycleMonths)||0;
  if(ls&&ls.payType==="기간제"&&Number(ls.payCycle))months=Number(ls.payCycle); // 매출 기간수 우선
  if(!months)months=1;
  const d=new Date(base+"T00:00:00");
  d.setMonth(d.getMonth()+months);
  const due=ymd(d);
  const dday=Math.ceil((new Date(due+"T00:00:00")-new Date(todayStr()+"T00:00:00"))/86400000);
  return {type:"date",due,dday,months};
}
function dueBadge(s){
  const info=nextDueInfo(s);
  if(info.type==="count"){
    const cls=info.remain<=0?"no":(info.remain<=2?"warn":"ok");
    return `<span class="pill duepill ${cls}">잔여 ${info.remain}회</span>`;
  }
  if(info.type==="date"){
    const cls=info.dday<0?"no":(info.dday<=7?"warn":"ok");
    const dd=info.dday<0?`${-info.dday}일 지남`:(info.dday===0?"오늘":`D-${info.dday}`);
    return `<span class="pill duepill ${cls}">${dd}</span>`;
  }
  return `<span class="pill duepill" style="background:var(--bg);color:var(--sub)">미설정</span>`;
}

function connectSupa(){
  const url=(document.getElementById("supaUrl").value||"").trim().replace(/\/+$/,'');
  const key=(document.getElementById("supaKey").value||"").trim();
  if(!/^https:\/\/[a-z0-9]+\.supabase\.co$/i.test(url)){
    alert("Project URL이 올바르지 않습니다.\n형태: https://xxxxx.supabase.co");

  }
  if(!key.startsWith("sb_publishable_") && !key.startsWith("eyJ")){
    alert("Publishable key가 올바르지 않습니다.\n(sb_publishable_ 또는 eyJ로 시작해야 합니다)");
    return;
  }
  GAS=url;
  SUPA_KEY=key;
  try{
    localStorage.setItem("jei_supa_url",url);

  }catch(e){}

function paginate(arr,page,per){
  const totalPages=Math.max(1,Math.ceil(arr.length/per));
  const p=Math.min(Math.max(1,page),totalPages);
  return {rows:arr.slice((p-1)*per,p*per),totalPages,page:p,total:arr.length};
}
function pagerHtml(key,pg){
  if(pg.totalPages<=1)return "";
  let btns="";
  for(let i=1;i<=pg.totalPages;i++)btns+=`<button class="btn sm" style="${i===pg.page?'background:var(--green);color:#fff;border:none':''}" onclick="bookPageSet('${key}',${i})">${i}</button>`;
  return `<div style="display:flex;gap:5px;justify-content:center;margin-top:10px;flex-wrap:wrap">${btns}</div>`;
}

/* 연간 장부 피벗 (기존 엑셀 대시보드 양식) */
function yearPivot(items,getCol,getVal,colOrder,yr){
  const data={};for(let m=1;m<=12;m++)data[m]={};
  const colsSet=new Set();
  items.forEach(it=>{
    const d=String(it.date);if(!d.startsWith(yr))return;
    const m=Number(d.slice(5,7));if(!m)return;
    const c=getCol(it)||"(미지정)";colsSet.add(c);
    data[m][c]=(data[m][c]||0)+getVal(it);
  });
  let cols=[...colsSet];
  if(colOrder)cols=colOrder.filter(c=>colsSet.has(c)).concat(cols.filter(c=>!colOrder.includes(c)));
  return {data,cols};
}
function pivotHtml(title,p){
  if(!p.cols.length)return `<div class="panel"><h2>${title}</h2><div class="empty">${ui.ledgerYear}년 기록이 없습니다.</div></div>`;
  const colTot={};let grand=0;
  const rows=Array.from({length:12},(_,i)=>{
    const m=i+1;let rs=0;
    const tds=p.cols.map(c=>{const v=p.data[m][c]||0;colTot[c]=(colTot[c]||0)+v;rs+=v;return `<td>${v?won(v):"-"}</td>`;}).join("");
    grand+=rs;
    return `<tr><td>${m}월</td>${tds}<td><b>${rs?won(rs):"-"}</b></td></tr>`;
  }).join("");
  return `<div class="panel"><h2>${title}</h2><div style="overflow:auto"><table class="mini-table"><thead><tr><th>월</th>${p.cols.map(c=>`<th>${esc(c)}</th>`).join("")}<th>합계</th></tr></thead><tbody>${rows}<tr style="background:var(--green-light)"><td><b>합계</b></td>${p.cols.map(c=>`<td><b>${colTot[c]?won(colTot[c]):"-"}</b></td>`).join("")}<td><b>${grand?won(grand):"-"}</b></td></tr></tbody></table></div></div>`;
}

function chargeStudent(id){
  const s=findStu(id);if(!s)return;
  const cur=Number(s.charged)||Number(s.totalSessions)||0;
  const used=DB.attendance.filter(a=>String(a.sid)===String(s.id)).length;
  const n=prompt(`${s.name} 횟수 충전\n현재: 충전 ${cur}회 · 사용 ${used}회 · 잔여 ${cur-used}회\n\n추가할 횟수를 입력하세요 (예: 4, 8, 12, 16). 차감은 음수(-4)로 입력.`,s.totalSessions||"");
  if(n===null)return;
  const add=Number(n);
  if(!add){alert("숫자를 입력하세요.");return;}
  s.charged=cur+add;
  if(s.charged<0)s.charged=0;
  s.lastPaid=todayStr();
  save();render();
  alert(`${s.name} → 누적충전 ${s.charged}회 (잔여 ${s.charged-used}회)`);
}

function addStudent(){
  const f=readStuForm();
  if(!f.name||!f.tuition||!f.course){alert("성명, 과정명, 수강료는 필수입니다.");return;}
  DB.students.push(Object.assign({id:uid(),status:"재원",note:""},f));
  ui.showStuForm=false;save();render();
}
function saveStudent(id){
  const s=findStu(id);if(!s)return;
  const f=readStuForm();
  if(!f.name||!f.tuition||!f.course){alert("성명, 과정명, 수강료는 필수입니다.");return;}
  if(f.course!==s.course)logCourseChange(s.id,s.course,f.course);
  const newStatus=val("f_stat")||s.status;
  const qd=val("f_qd");
  if(newStatus==="퇴원")s.quitDate=qd||(s.status!=="퇴원"?todayStr():s.quitDate);
  if(newStatus==="재원")s.quitDate="";
  Object.assign(s,f,{status:newStatus});
  ui.editStu=false;save();render();
}

/* 연간 출석 달력: 세로=월, 가로=일, 출석일 O 표시 */
function attYearGridHtml(s){
  const allAtt=DB.attendance.filter(a=>String(a.sid)===String(s.id));
  const years=[...new Set(allAtt.map(a=>String(a.date).slice(0,4)).filter(y=>/^\d{4}$/.test(y)))].sort().reverse();
  const yr=ui.stuAttYear&&years.includes(ui.stuAttYear)?ui.stuAttYear:(years[0]||String(new Date().getFullYear()));
  // 월별 출석일 집합
  const byMonth={};
  allAtt.forEach(a=>{
    const d=String(a.date);
    if(d.slice(0,4)!==yr)return;
    const m=Number(d.slice(5,7)),day=Number(d.slice(8,10));
    if(!m||!day)return;
    (byMonth[m]=byMonth[m]||new Set()).add(day);
  });
  const yearTotal=Object.values(byMonth).reduce((a,st)=>a+st.size,0);
  const daysInMonth=(y,m)=>new Date(Number(y),m,0).getDate();
  const head=`<tr><th style="min-width:42px">월</th>${Array.from({length:31},(_,i)=>`<th style="min-width:22px;padding:4px 2px;text-align:center">${i+1}</th>`).join("")}<th style="min-width:36px">합계</th></tr>`;
  const rows=Array.from({length:12},(_,i)=>{
    const m=i+1,dim=daysInMonth(yr,m),set=byMonth[m]||new Set();
    const cells=Array.from({length:31},(_,j)=>{
      const day=j+1;
      if(day>dim)return `<td style="background:var(--bg);padding:4px 2px"></td>`;
      return `<td style="text-align:center;padding:4px 2px;${set.has(day)?'color:var(--green);font-weight:800':''}">${set.has(day)?"O":""}</td>`;
    }).join("");
    return `<tr><td style="font-weight:700">${m}월</td>${cells}<td style="text-align:center;font-weight:800;color:${set.size?'var(--green)':'var(--sub)'}">${set.size||""}</td></tr>`;
  }).join("");
  return `
  <div class="panel"><h2><span>📅 연간 출석 현황 <span style="font-size:13px;color:var(--sub)">(${yr}년 총 ${yearTotal}회 출석)</span></span>
    <select onchange="ui.stuAttYear=this.value;render()" style="padding:5px">
      ${(years.length?years:[yr]).map(y=>`<option ${y===yr?'selected':''}>${y}</option>`).join("")}
    </select></h2>
    ${allAtt.length?`<div style="overflow:auto"><table style="font-size:12px;border-collapse:collapse">${head}${rows}</table></div>
    <p class="note">※ O = 출석한 날. 회색 칸은 없는 날짜. 오른쪽 끝은 월별 출석 횟수 합계입니다.</p>`
    :`<div class="empty">출결 기록이 없습니다.</div>`}
  </div>`;
}
function addConsult(sid){
  const tx=val("c_tx").trim();
  if(!tx){alert("상담 내용을 입력하세요.");return;}
  DB.consults.push({id:uid(),sid:String(sid),date:val("c_dt"),text:tx});
  save();render();
}
function delConsult(id){if(confirm("이 상담 기록을 삭제할까요?")){DB.consults=DB.consults.filter(x=>String(x.id)!==String(id));save();render();}}
function saveNote(sid){
  const s=findStu(sid);if(!s)return;
  s.note=val("s_note");save();alert("참고사항이 저장되었습니다.");
}
function payStudent(id){
  const s=findStu(id);if(!s)return;
  if(s.payCycle==="횟수제"){
    const n=prompt(`${s.name} — 이번 결제로 충전할 횟수를 입력하세요`,s.totalSessions||"");
    if(n===null)return;
    const nn=Number(n)||0;
    if(!nn){alert("숫자를 입력하세요.");return;}
    s.charged=(Number(s.charged)||Number(s.totalSessions)||0)+nn;
    s.lastPaid=todayStr();
  }else{
    if(!confirm(`${s.name} 수강료 결제를 등록할까요?\n최근결제일이 오늘로 갱신되고, 매출상세 입력 화면으로 이동합니다.`))return;
    s.lastPaid=todayStr();
  }
  save();
  ui.salesPrefill={name:s.name,course:s.course,tuition:s.tuition};
  ui.salesLinkDone=s.name; // 이미 갱신·충전했으므로 매출 입력 시 중복 처리 방지
  tab="sales";ui.detailId=null;render();
}

function kioskKey(k){
  ui.kioskMsg="";
  if(k==="지움"){ui.kioskInput=(ui.kioskInput||"").slice(0,-1);render();return;}
  if(k==="확인"){kioskCheckPad();return;}
  if((ui.kioskInput||"").length>=4)return;
  ui.kioskInput=(ui.kioskInput||"")+k;
  render(); // 자동 넘어감 없음 — 확인 눌러야 진행
}
function kioskCheckPad(){
  const n=ui.kioskInput||"";
  if(n.length!==4){ui.kioskMsg="숫자 4자리를 입력한 뒤 확인을 누르세요.";render();return;}
  const matches=DB.students.filter(s=>s.status!=="퇴원"&&digits(s.phone).endsWith(n));
  if(!matches.length){ui.kioskMsg="일치하는 수강생이 없습니다. 데스크에 문의하세요.";ui.kioskInput="";ui.kioskChoices=null;render();return;}
  if(matches.length>1){ui.kioskChoices=matches.map(s=>({id:s.id,name:s.name}));render();return;}
  kioskPick(matches[0].id);
}
function kioskPick(sid){
  const s=findStu(sid);if(!s)return;
  ui.kioskChoices=null;ui.kioskInput="";
  ui.kioskAction={id:sid,name:s.name}; // 등하원 선택 단계로
  render();
}
function kioskCancel(){ui.kioskAction=null;ui.kioskInput="";ui.kioskMsg="";render();}
function kioskDo(type){
  const sel=ui.kioskAction;if(!sel)return;
  const s=findStu(sel.id);if(!s){kioskCancel();return;}
  const today=todayStr(),t=nowTime();
  let a=attOf(sel.id,today);
  let rec;
  if(type==="in"){
    if(!a){rec={id:uid(),sid:String(sel.id),name:s.name,date:today,inTime:t,outTime:"",memo:""};DB.attendance.push(rec);}
    else{a.inTime=t;rec={id:a.id,sid:String(sel.id),name:s.name,date:today,inTime:t,outTime:a.outTime||"",memo:a.memo||""};}
    ui.kioskMsg=`✓ ${s.name}님 등원 (${t}) — 어서오세요!`;
  }else{
    if(!a){rec={id:uid(),sid:String(sel.id),name:s.name,date:today,inTime:"",outTime:t,memo:""};DB.attendance.push(rec);}
    else{a.outTime=t;rec={id:a.id,sid:String(sel.id),name:s.name,date:today,inTime:a.inTime||"",outTime:t,memo:a.memo||""};}
    ui.kioskMsg=`✓ ${s.name}님 하원 (${t}) — 수고하셨습니다!`;
  }
  ui.kioskAction=null;
  // 패드는 출결만 시트에 추가 (매출·수강생 등 다른 데이터를 덮어쓰지 않음 → PC와 충돌 없음)
  saveAttOnly(rec);
  render();
  setTimeout(()=>{if(KIOSK){ui.kioskMsg="";render();}},5000);
}
async function saveAttOnly(rec){
  if(!GAS||!SUPA_KEY)return;
  try{
    setSync("⟳ 출결 저장…");
    const url=GAS.replace(/\/+$/,'')+"/rest/v1/attendance?on_conflict=id";
    const h={...supaHeaders(),"Prefer":"resolution=merge-duplicates,return=minimal"};
    const res=await fetch(url,{method:"POST",headers:h,body:JSON.stringify([rec])});
    if(res.ok){setSync("✓ 출결 저장됨 "+nowTime());}
    else{setSync("⚠ 출결 저장 실패",true);setTimeout(()=>saveAttOnly(rec),3000);}
  }catch(e){setSync("⚠ 출결 저장 실패",true);setTimeout(()=>saveAttOnly(rec),3000);}
}

      <label class="fld">과정<select onchange="ui.attCourse=this.value;render()"><option ${ui.attCourse==='전체'?'selected':''}>전체</option>${courseNames().map(c=>`<option ${ui.attCourse===c?'selected':''}>${esc(c)}</option>`).join("")}</select></label>
      ${(ui.attDate!==todayStr()||ui.attCourse!=='전체')?`<button class="btn sm" onclick="ui.attDate=todayStr();ui.attCourse='전체';render()">↺ 필터 해제 (오늘로)</button>`:""}
    </div>
    <div class="twrap" style="border:none"><table><thead><tr><th>성명</th><th>과정</th><th>입실</th><th>퇴실</th><th>비고 (사유·인정여부)</th><th></th></tr></thead><tbody>
    ${active.length?active.map(s=>{
      const a=attOf(s.id,ui.attDate);
      return `<tr><td><b>${esc(s.name)}</b></td><td>${esc(s.course)}</td>
      <td><input type="time" value="${a?esc(a.inTime):""}" onchange="setAttTime('${s.id}','inTime',this.value)" style="padding:5px 8px"></td>
      <td><input type="time" value="${a?esc(a.outTime):""}" onchange="setAttTime('${s.id}','outTime',this.value)" style="padding:5px 8px"></td>
      <td><input value="${a?esc(a.memo||""):""}" onchange="setAttMemo('${s.id}',this.value)" placeholder="예: 병결-인정, 무단-불인정" style="width:200px;padding:5px 8px"></td>
      <td>${a?`<button class="btn sm" onclick="delAtt('${a.id}')">기록 삭제</button>`:`<span class="pill" style="background:var(--bg);color:var(--sub)">미출석</span>`}</td></tr>`;
    }).join(""):`<tr><td colspan="6" class="empty">해당 과정에 재원 수강생이 없습니다.</td></tr>`}
    </tbody></table></div>
    <p class="note">※ 학생은 위 키오스크로 직접 체크 (첫 입력=입실, 두 번째 입력=퇴실). 시간 칸을 직접 수정해 수동 처리도 가능합니다. 횟수제 수강생은 입실 기록이 1회 차감 기준입니다.</p>
  </div>`;
}
function kioskCheck(){
  const n=digits(val("kioskNum"));
  if(n.length!==4){ui.kioskMsg="숫자 4자리를 입력하세요.";render();return;}
  const matches=DB.students.filter(s=>s.status!=="퇴원"&&digits(s.phone).endsWith(n));
  if(!matches.length){ui.kioskMsg="일치하는 수강생이 없습니다. 데스크에 문의하세요.";ui.kioskChoices=null;render();return;}
  if(matches.length>1){ui.kioskChoices=matches.map(s=>({id:s.id,name:s.name}));ui.kioskMsg="";render();return;}
  kioskRecord(matches[0].id);
}
function kioskRecord(sid){
  ui.kioskChoices=null;
  const s=findStu(sid);if(!s)return;
  const today=todayStr(),t=nowTime();
  let a=attOf(sid,today);
  if(!a){
    DB.attendance.push({id:uid(),sid:String(sid),date:today,inTime:t,outTime:""});
    ui.kioskMsg=`✓ ${s.name}님 입실 (${t}) — 어서오세요!`;
  }else if(!a.outTime){
    a.outTime=t;
    ui.kioskMsg=`✓ ${s.name}님 퇴실 (${t}) — 수고하셨습니다!`;
  }else{
    if(confirm(`${s.name}님은 오늘 입실(${a.inTime})·퇴실(${a.outTime}) 기록이 이미 있습니다.\n퇴실 시간을 ${t}(으)로 갱신할까요?`)){a.outTime=t;ui.kioskMsg=`✓ ${s.name}님 퇴실 시간 갱신 (${t})`;}
    else{ui.kioskMsg="";}
  }
  save();ui.attDate=today;render();
  const inp=document.getElementById("kioskNum");if(inp){inp.value="";inp.focus();}
}
/* 지난 출결 일괄 입력 */
function bulkHtml(){
  const b=ui.bulk;
  const stuOpts=DB.students.filter(s=>s.status!=="퇴원").sort((a,b)=>String(a.name).localeCompare(String(b.name),"ko")).map(s=>`<option value="${s.id}" ${String(b.sid)===String(s.id)?'selected':''}>${esc(s.name)} (${esc(s.course)})</option>`).join("");
  let grid="";
  if(b.sid){
    const [y,m]=b.month.split("-").map(Number);
    const dim=new Date(y,m,0).getDate();
    const existing=new Set(DB.attendance.filter(a=>String(a.sid)===String(b.sid)&&String(a.date).startsWith(b.month)).map(a=>Number(String(a.date).slice(8,10))));
    grid=`<div class="dgrid">${Array.from({length:dim},(_,i)=>{
      const d=i+1;
      if(existing.has(d))return `<button class="dbtn done" title="출결 기록 있음 — 클릭하면 삭제" onclick="bulkDelDay(${d})">${d}</button>`;
      const sel=b.days.includes(d);
      return `<button class="dbtn ${sel?'sel':''}" onclick="bulkToggleDay(${d})">${d}</button>`;
    }).join("")}</div>
    <p class="note">초록=기록 있음(<b>클릭하면 삭제</b>) · 주황=저장 대기. 출석한 날짜를 클릭한 뒤 저장하세요.</p>
    <button class="btn" onclick="bulkSave()" ${b.days.length?"":"disabled style='opacity:.5'"}>선택한 ${b.days.length}일 출석 저장 (시간 없음)</button>`;
  }
  return `<div class="mgr">
    <b style="font-size:13px">📆 지난 출결 일괄 입력</b> <span style="font-size:12px;color:var(--sub)">— 과거 출석을 날짜만으로 등록 (입실·퇴실 시간 비움)</span>
    <div style="display:flex;gap:8px;margin:10px 0;flex-wrap:wrap">
      <label class="fld">수강생<select onchange="ui.bulk.sid=this.value;ui.bulk.days=[];render()"><option value="">선택하세요</option>${stuOpts}</select></label>
      <label class="fld">월<input type="month" value="${b.month}" onchange="ui.bulk.month=this.value;ui.bulk.days=[];render()"></label>
    </div>
    ${grid}
  </div>`;
}
function bulkDelDay(d){
  const b=ui.bulk;
  const date=`${b.month}-${String(d).padStart(2,"0")}`;
  const a=attOf(b.sid,date);
  if(!a)return;
  const s=findStu(b.sid);
  if(!confirm(`${date} ${s?s.name:""} 출석 기록을 삭제할까요?`))return;
  DB.attendance=DB.attendance.filter(x=>String(x.id)!==String(a.id));
  save();render();
}
function bulkToggleDay(d){
  const i=ui.bulk.days.indexOf(d);
  if(i>=0)ui.bulk.days.splice(i,1);else ui.bulk.days.push(d);
  render();
}
function bulkSave(){
  const b=ui.bulk;
  if(!b.sid||!b.days.length)return;
  b.days.forEach(d=>{
    const date=`${b.month}-${String(d).padStart(2,"0")}`;
    const s=findStu(b.sid);
    if(!attOf(b.sid,date))DB.attendance.push({id:uid(),sid:String(b.sid),name:s?s.name:"",date,inTime:"",outTime:""});
  });
  const n=b.days.length;
  b.days=[];
  save();render();
  alert(`${n}일의 출석 기록이 저장되었습니다. (횟수제 차감에 반영됨)`);
}
function setAttMemo(sid,value){
  let a=attOf(sid,ui.attDate);
  if(!a){a={id:uid(),sid:String(sid),date:ui.attDate,inTime:"",outTime:"",memo:""};DB.attendance.push(a);}
  a.memo=value;save();
}
function setAttTime(sid,field,value){  let a=attOf(sid,ui.attDate);
  if(!a){a={id:uid(),sid:String(sid),date:ui.attDate,inTime:"",outTime:""};DB.attendance.push(a);}
  a[field]=value;save();
}
function delAtt(id){if(confirm("이 출결 기록을 삭제할까요?")){DB.attendance=DB.attendance.filter(x=>String(x.id)!==String(id));save();render();}}

/* ───── 매출상세 ───── */
function viewSales(){
  const pf=ui.salesPrefill||{};ui.salesPrefill=null;
  const list=DB.sales.map((l,idx)=>({l,idx})).filter(o=>normDate(o.l.date).startsWith(ui.salesMonth)&&(!ui.salesName||String(o.l.name).includes(ui.salesName))).sort((a,b)=>String(normDate(b.l.date)).localeCompare(String(normDate(a.l.date)))||b.idx-a.idx).map(o=>o.l);

  return `

  </div>
  <div class="toolbar" style="border-top:1px solid var(--line);padding-top:10px">
    <span style="font-size:13px;color:var(--sub)">선택한 항목:</span>
    <button class="btn sm" onclick="salesEditSelected()">✎ 수정</button>
    <button class="btn sm" onclick="salesDepositSelected()">💰 입금 입력</button>
    <button class="btn sm" style="color:var(--red)" onclick="salesDeleteSelected()">🗑 삭제</button>
    <span id="selCount" style="font-size:13px;color:var(--sub)"></span>
  </div>
  <div class="formbox">
    <label class="fld">날짜<input type="date" id="m_dt" value="${todayStr()}"></label>
    <label class="fld">결제수단<select id="m_md" onchange="document.getElementById('m_cardwrap').style.display=this.value==='카드'?'flex':'none'">${SALE_METHODS.map(m=>`<option>${m}</option>`).join("")}</select></label>
    <label class="fld">구분<select id="m_gb"><option>성인</option><option>학생</option></select></label>
    <label class="fld">성명<input id="m_nm" value="${esc(pf.name||"")}" list="stuNames"><datalist id="stuNames">${[...DB.students].sort((a,b)=>String(a.name).localeCompare(String(b.name),"ko")).map(s=>`<option value="${esc(s.name)}">`).join("")}</datalist></label>
    <label class="fld">과정명${courseSelect("m_co",pf.course||"",true)}</label>
    <label class="fld">수강료(원)<input type="number" id="m_tu" value="${pf.tuition||""}"></label>
    <label class="fld">할인(원)<input type="number" id="m_dc" value="0"></label>
    <label class="fld">결제방식<select id="m_pt" onchange="document.getElementById('m_pcwrap').style.display=this.value==='기간제'?'flex':(this.value==='횟수제'?'flex':'none');document.getElementById('m_pclab').textContent=this.value==='횟수제'?'충전횟수':'결제주기(개월)'"><option value="">선택</option><option>기간제</option><option>횟수제</option></select></label>
    <label class="fld" id="m_pcwrap" style="display:none"><span id="m_pclab">결제주기(개월)</span><input id="m_pc" type="number" value="" placeholder="횟수제: 충전횟수"></label>
    <label class="fld" id="m_cardwrap" style="display:none">카드사<span style="display:flex;gap:4px"><select id="m_cc" style="flex:1"><option value=""></option>${cardCos().map(c=>`<option>${esc(c)}</option>`).join("")}</select><button type="button" class="btn sm" onclick="addCardCo()" title="카드사 추가">＋</button></span></label>
    <label class="fld">승인번호<input id="m_ap"></label>
    <label class="fld">비고<input id="m_no"></label>
    <button class="btn" onclick="addSales()">납입 기록</button>
  </div>
  <div class="twrap"><table><thead><tr><th><input type="checkbox" onchange="salesToggleAll(this.checked)" title="전체 선택"></th><th>날짜</th><th>결제수단</th><th>결제금액</th><th>구분</th><th>성명</th><th>과정명</th><th>방식</th><th>수강료</th><th>할인</th><th>카드사</th><th>승인번호</th><th>입금일</th><th>입금액</th><th>수수료</th><th>비고</th></tr></thead><tbody id="salesBody">
  ${salesRowsHtml(list)}
  </tbody></table></div>
  <p class="note">※ <b>계좌이체·현금</b>은 결제일에 자동으로 입금 처리됩니다. <b>카드</b>는 입금일을 비워두고, 며칠 뒤 입금되면 <b>✎ 입금</b>으로 입금일·입금액을 입력하면 <b>수수료=결제금액−입금액</b>으로 자동 계산됩니다.</p>`;

function salesFiltered(){
  return DB.sales.map((l,idx)=>({l,idx})).filter(o=>normDate(o.l.date).startsWith(ui.salesMonth)&&(!ui.salesName||String(o.l.name).includes(ui.salesName))).sort((a,b)=>String(normDate(b.l.date)).localeCompare(String(normDate(a.l.date)))||b.idx-a.idx).map(o=>o.l);
}
function salesRowsHtml(list){
  if(!list.length)return `<tr><td colspan="16" class="empty">${ui.salesMonth}월 수강료 납입내역이 없습니다.</td></tr>`;
  return list.map(l=>{
    const editing=String(ui.salesEditId)===String(l.id);
    const fullEdit=String(ui.salesFullEditId)===String(l.id);
    if(fullEdit){
      const names=courseNames();
      const coOpts=(l.course&&!names.includes(l.course)?[l.course]:[]).concat(names).map(c=>`<option ${l.course===c?'selected':''}>${esc(c)}</option>`).join("");
      return `<tr style="background:var(--green-light)">
        <td style="white-space:nowrap"><button class="btn sm" style="background:var(--green);color:#fff;border:none" onclick="saveSalesFull('${l.id}')">저장</button> <button class="btn sm" onclick="ui.salesFullEditId=null;ui.salesSel=[];render()">취소</button></td>
        <td><input type="date" id="fe_dt" value="${esc(l.date)}" style="padding:4px;width:130px"></td>
        <td><select id="fe_md" style="padding:4px">${SALE_METHODS.map(mm=>`<option ${l.method===mm?'selected':''}>${esc(mm)}</option>`).join("")}</select></td>
        <td>${won(l.paidAmount)}</td>
        <td><select id="fe_gb" style="padding:4px"><option ${l.gubun==='성인'?'selected':''}>성인</option><option ${l.gubun==='학생'?'selected':''}>학생</option></select></td>
        <td><input id="fe_nm" value="${esc(l.name)}" style="padding:4px;width:80px"></td>
        <td><select id="fe_co" style="padding:4px"><option value=""></option>${coOpts}</select></td>
        <td><select id="fe_pt" style="padding:4px"><option value="" ${!l.payType?'selected':''}></option><option ${l.payType==='기간제'?'selected':''}>기간제</option><option ${l.payType==='횟수제'?'selected':''}>횟수제</option></select><input id="fe_pc" value="${esc(l.payCycle)}" style="padding:4px;width:50px" placeholder="주기/횟수"></td>
        <td><input type="number" id="fe_tu" value="${l.tuition}" style="padding:4px;width:80px"></td>
        <td><input type="number" id="fe_dc" value="${l.discount||0}" style="padding:4px;width:60px"></td>
        <td><input id="fe_cc" value="${esc(l.cardCo)}" style="padding:4px;width:60px"></td>
        <td><input id="fe_ap" value="${esc(l.approval)}" style="padding:4px;width:80px"></td>
        <td>${esc(l.depositDate)||"-"}</td><td>${l.depositAmount?won(l.depositAmount):"-"}</td><td>${l.fee?won(l.fee):"-"}</td>
        <td><input id="fe_no" value="${esc(l.note)}" style="padding:4px;width:80px"></td></tr>`;
    }
    const depCell=editing?`
      <td><input type="date" id="ed_dd" value="${esc(l.depositDate)}" style="padding:5px"></td>
      <td><input type="number" id="ed_da" value="${l.depositAmount||""}" style="width:95px;padding:5px"></td>
      <td><input type="number" id="ed_fee" value="${l.fee||0}" style="width:70px;padding:5px"></td>`
      :`<td>${esc(l.depositDate)||'<span style="color:var(--amber)">대기</span>'}</td><td>${l.depositAmount?won(l.depositAmount):"-"}</td><td>${l.fee?won(l.fee):"-"}</td>`;
    const lastCell=editing
      ? `<td style="white-space:nowrap"><button class="btn sm" style="background:var(--green);color:#fff;border:none" onclick="saveDeposit('${l.id}')">저장</button> <button class="btn sm" onclick="ui.salesEditId=null;ui.salesSel=[];render()">취소</button></td>`
      : `<td style="text-align:center"><input type="checkbox" class="salesChk" value="${l.id}" ${ui.salesSel&&ui.salesSel.includes(l.id)?'checked':''} onchange="salesToggle('${l.id}',this.checked)"></td>`;
    return `<tr>${lastCell}<td>${esc(l.date)}</td><td>${esc(l.method)}</td><td><b style="${Number(l.paidAmount)<0?'color:var(--red)':''}">${won(l.paidAmount)}원</b></td><td>${esc(l.gubun)}</td><td>${esc(l.name)}</td><td>${esc(l.course)}</td><td>${esc(l.payType)||"-"}${l.payCycle?`<div style="font-size:10px;color:var(--sub)">${esc(l.payCycle)}${l.payType==='횟수제'?'회':'개월'}</div>`:""}</td><td>${won(l.tuition)}</td><td>${l.discount?won(l.discount):"-"}</td><td>${esc(l.cardCo)}</td><td>${esc(l.approval)||"-"}</td>
    ${depCell}
    <td>${esc(l.note)}</td></tr>`;
  }).join("");
}
function salesToggle(id,checked){
  if(!ui.salesSel)ui.salesSel=[];
  if(checked){if(!ui.salesSel.includes(id))ui.salesSel.push(id);}
  else ui.salesSel=ui.salesSel.filter(x=>x!==id);
  updateSelCount();
}
function salesToggleAll(checked){
  ui.salesSel=checked?salesFiltered().map(l=>l.id):[];
  refreshSalesTable();updateSelCount();
}
function updateSelCount(){
  const el=document.getElementById("selCount");
  if(el)el.textContent=ui.salesSel&&ui.salesSel.length?`${ui.salesSel.length}건 선택됨`:"";
}
function salesEditSelected(){
  const sel=ui.salesSel||[];
  if(sel.length!==1){alert("수정은 1건만 선택하세요.");return;}
  ui.salesFullEditId=sel[0];render();
}
function salesDepositSelected(){
  const sel=ui.salesSel||[];
  if(sel.length!==1){alert("입금 입력은 1건만 선택하세요.");return;}
  ui.salesEditId=sel[0];render();
}
function salesDeleteSelected(){
  const sel=ui.salesSel||[];
  if(!sel.length){alert("삭제할 항목을 선택하세요.");return;}
  if(!confirm(`선택한 ${sel.length}건의 매출을 삭제할까요?`))return;
  DB.sales=DB.sales.filter(x=>!sel.includes(x.id));
  ui.salesSel=[];save();render();
}
function saveSalesFull(id){
  const l=DB.sales.find(x=>String(x.id)===String(id));if(!l)return;
  const tu=num("fe_tu"),dc=num("fe_dc");
  l.date=val("fe_dt");l.method=val("fe_md");l.gubun=val("fe_gb");l.name=val("fe_nm").trim();
  l.course=val("fe_co");l.payType=val("fe_pt");l.payCycle=val("fe_pc");
  l.tuition=tu;l.discount=dc;l.paidAmount=tu-dc;l.cardCo=val("fe_cc");l.approval=val("fe_ap");l.note=val("fe_no");
  ui.salesFullEditId=null;ui.salesSel=[];save();render();
}
function refreshSalesTable(){
  const el=document.getElementById("salesBody");
  if(el)el.innerHTML=salesRowsHtml(salesFiltered());
}
function addSales(){
  const tu=num("m_tu"),dc=num("m_dc");
  if(!tu){alert("수강료(금액)는 필수입니다.");return;}
  const nm=val("m_nm").trim(),date=val("m_dt"),payType=val("m_pt"),payCycleVal=val("m_pc");
  const method=val("m_md");
  const paid=tu-dc;
  // 카드는 입금일 비워두고 나중에 입력, 그 외(계좌이체·현금·휴대폰)는 결제일=입금일 즉시 처리
  const isCard=method==="카드";
  DB.sales.push({id:uid(),date,method,paidAmount:paid,gubun:val("m_gb"),name:nm,course:val("m_co"),tuition:tu,discount:dc,cardCo:isCard?val("m_cc"):"",approval:val("m_ap"),depositDate:isCard?"":date,depositAmount:isCard?0:paid,fee:0,note:val("m_no"),payType,payCycle:payCycleVal});
  // 성명 기준 수강생 연동: 최근납부일 갱신 + 횟수제 충전
  if(nm&&nm!==ui.salesLinkDone){
    let matches=DB.students.filter(st=>st.name===nm&&st.status!=="퇴원");
    if(matches.length>1){
      const co=val("m_co");
      const narrowed=matches.filter(st=>st.course===co);
      if(narrowed.length===1)matches=narrowed;
    }
    if(matches.length===1){
      const st=matches[0];
      st.lastPaid=date;
      // 횟수제이면 충전: 매출에 입력한 충전횟수 우선, 없으면 결제방식/수강생 설정으로 판단
      const isCount = payType==="횟수제" || (!payType && st.payCycle==="횟수제");
      if(isCount){
        let add=Number(payCycleVal)||0;
        if(!add){
          const n=prompt(`${nm} — 이번 결제로 충전할 횟수를 입력하세요 (예: 4, 8, 12, 16)`,st.totalSessions||"");
          if(n!==null)add=Number(n)||0;
        }
        if(add>0){
          st.charged=(Number(st.charged)||Number(st.totalSessions)||0)+add;
          alert(`${nm} 누적충전 ${add}회 추가 → 총 ${st.charged}회 (잔여 자동 계산)`);
        }
      }
    }else if(matches.length>1){
      alert("동명이인 수강생이 있고 과정명으로도 구분되지 않아 자동 연결하지 않았습니다. 수강생 목록에서 직접 갱신하세요.");
    }else{
      alert(`'${nm}'와 일치하는 재원 수강생이 없어 자동 연동하지 않았습니다. (매출만 기록됨)`);
    }
  }
  ui.salesLinkDone=null;
  save();render();
}
function saveDeposit(id){
  const l=DB.sales.find(x=>String(x.id)===String(id));if(!l)return;
  l.depositDate=val("ed_dd");
  const da=num("ed_da");
  const feeInput=val("ed_fee");
  if(da>0){
    // 입금액을 입력하면 수수료 = 결제금액 − 입금액 자동 계산 (카드 수수료)
    l.depositAmount=da;
    l.fee=Math.max(0, Number(l.paidAmount)-da);
  }else{
    // 입금액 비우고 수수료만 넣으면 입금액 = 결제금액 − 수수료
    l.fee=num("ed_fee");
    l.depositAmount=Number(l.paidAmount)-l.fee;
  }
  ui.salesEditId=null;ui.salesSel=[];save();render();
}

function getIncCat(){
  // 기본 INC_CAT + 사용자 추가(settings: incCat) − 숨김(incHide)
  const merged={};
  Object.keys(INC_CAT).forEach(k=>merged[k]=INC_CAT[k].slice());
  DB.settings.filter(x=>x.key==="incCat").forEach(x=>{
    const [big,acct]=String(x.value).split("|");
    if(!big)return;
    if(!merged[big])merged[big]=[];
    if(acct&&!merged[big].includes(acct))merged[big].push(acct);
  });
  DB.settings.filter(x=>x.key==="incHide").forEach(x=>{const [big,acct]=String(x.value).split("|");if(merged[big]){merged[big]=merged[big].filter(a=>a!==acct);if(!merged[big].length)delete merged[big];}});
  Object.keys(merged).forEach(k=>merged[k].sort((a,b)=>String(a).localeCompare(String(b),"ko")));
  return merged;
}
function getExpCat(){
  const merged={};
  Object.keys(EXP_CAT).forEach(k=>merged[k]=EXP_CAT[k].slice());
  DB.settings.filter(x=>x.key==="expCat").forEach(x=>{
    const [big,acct]=String(x.value).split("|");
    if(!big)return;
    if(!merged[big])merged[big]=[];
    if(acct&&!merged[big].includes(acct))merged[big].push(acct);
  });
  DB.settings.filter(x=>x.key==="expHide").forEach(x=>{const [big,acct]=String(x.value).split("|");if(merged[big]){merged[big]=merged[big].filter(a=>a!==acct);if(!merged[big].length)delete merged[big];}});

  return merged;
}

function expEditAcct(){
  const EXPC=getExpCat();const big=val("ee_big");const sel=document.getElementById("ee_acct");
  if(sel&&EXPC[big])sel.innerHTML=EXPC[big].map(a=>`<option>${a}</option>`).join("");
}
function expBulkBar(EXPC){
  const sel=ui.expSel||[];

  const selBigs=[...new Set(sel.map(id=>{const l=DB.expense.find(x=>String(x.id)===String(id));return l?l.big:"";}))];
  const acctBig=selBigs.length===1?selBigs[0]:bigs[0];

    <label class="fld">대분류<select id="ebulk_big" onchange="expBulkAcctFill()">${bigs.map(b=>`<option ${b===acctBig?'selected':''}>${esc(b)}</option>`).join("")}</select></label>
    <label class="fld">계정과목<select id="ebulk_acct">${(EXPC[acctBig]||[]).map(a=>`<option>${esc(a)}</option>`).join("")}</select></label>

    <span style="color:var(--line)">|</span>
    <button class="btn sm" style="background:var(--red);color:#fff;border:none" onclick="expBulkDelete()">🗑 선택 삭제</button>
    <button class="btn sm" onclick="ui.expSel=[];render()">선택 해제</button>
  </div>`;
}
function expToggle(id,on){
  if(!ui.expSel)ui.expSel=[];
  if(on){if(!ui.expSel.includes(id))ui.expSel.push(id);}
  else{ui.expSel=ui.expSel.filter(x=>x!==id);}
  render();
}
function expToggleAll(on){
  const list=DB.expense.filter(l=>String(l.date).startsWith(ui.expMonth));
  ui.expSel=on?list.map(l=>l.id):[];
  render();
}
function expBulkAcctFill(){
  const EXPC=getExpCat();const big=val("ebulk_big");const sel=document.getElementById("ebulk_acct");
  if(sel&&EXPC[big])sel.innerHTML=EXPC[big].map(a=>`<option>${esc(a)}</option>`).join("");
}
function expBulkApply(){
  const big=val("ebulk_big"),acct=val("ebulk_acct");const sel=ui.expSel||[];if(!sel.length)return;
  sel.forEach(id=>{const l=DB.expense.find(x=>String(x.id)===String(id));if(l){l.big=big;l.acct=acct;}});
  ui.expSel=[];
  save();render();
}

function expBulkDelete(){
  const sel=ui.expSel||[];if(!sel.length)return;
  if(!confirm(`선택한 ${sel.length}건의 지출 기록을 삭제할까요?\n\n삭제하면 되돌릴 수 없습니다.`))return;
  DB.expense=DB.expense.filter(l=>!sel.includes(l.id));
  ui.expSel=[];render();saveForceQuiet();
}
function saveExpEdit(id){
  const l=DB.expense.find(x=>String(x.id)===String(id));if(!l)return;
  const am=num("ee_am"),dc=num("ee_dc");
  l.date=val("ee_dt");l.big=val("ee_big");l.acct=val("ee_acct");l.desc=val("ee_desc");l.vendor=val("ee_vd");l.amount=am;l.discount=dc;l.paidAmount=am-dc;l.method=val("ee_md");l.memo=val("ee_mm");
  ui.expEditId=null;save();render();
}
function addExp(){
  const am=num("e_am"),dc=num("e_dc");
  if(!am){alert("금액은 필수입니다.");return;}
  DB.expense.push({id:uid(),date:val("e_dt"),big:val("e_big"),acct:val("e_acct"),desc:val("e_desc"),vendor:val("e_vd"),memo:val("e_mm"),amount:am,discount:dc,paidAmount:am-dc,method:val("e_md"),note:""});

}
function delExp(id){if(confirm("이 지출 기록을 삭제할까요?")){DB.expense=DB.expense.filter(x=>String(x.id)!==String(id));save();render();}}

function bookTitles(){return [...new Set(DB.bookin.map(b=>b.title))].sort((a,b)=>String(a).localeCompare(String(b),"ko"));}
function latestBuyPrice(title){
  const list=DB.bookin.filter(b=>b.title===title).sort((a,b)=>String(b.date).localeCompare(String(a.date)));

function printStock(){
  const stock={};
  DB.bookin.forEach(b=>{const t=b.title;stock[t]=stock[t]||{inQ:0,outQ:0};stock[t].inQ+=Number(b.qty);});

  <style>
    @page{size:A4;margin:15mm}
    body{font-family:'Malgun Gothic',sans-serif;color:#000}
    h1{text-align:center;font-size:20px;margin:0 0 4px}
    .info{text-align:right;font-size:12px;margin-bottom:10px}

    th{background:#eee}
    .sign{margin-top:20px;text-align:right;font-size:13px}
  </style></head><body>
  <h1>제이컴퓨터학원 도서 재고조사표</h1>
  <div class="info">조사일: ${todayStr()} &nbsp;&nbsp; 조사자: ____________</div>
  <table><thead><tr><th style="width:8%">No</th><th>교재명</th><th style="width:11%">입고</th><th style="width:11%">출고</th><th style="width:13%">전산재고</th><th style="width:13%">실재고</th><th style="width:13%">비고</th></tr></thead>
  <tbody>${rows||'<tr><td colspan="7" style="text-align:center">재고 없음</td></tr>'}</tbody></table>
  <p style="font-size:12px;margin-top:8px">※ 전산재고 = 입고−출고. ‘실재고’ 칸에 실제 조사 수량을 적고 차이를 비고에 기록하세요.</p>
  <div class="sign">확인: 원장 ____________ (인)</div>
  <script>window.onload=function(){window.print();}<\/script>

  w.document.write(html);w.document.close();
}
function bookSubBar(){

  return `<div class="subtabs">${subs.map(([k,l])=>`<button class="subtab ${(ui.bookSub||"quick")===k?'on':''}" onclick="ui.bookSub='${k}';render()">${l}</button>`).join("")}</div>`;

function _bookStock(){
  const stock={};
  DB.bookin.forEach(b=>{const t=b.title;stock[t]=stock[t]||{inQ:0,inA:0,outQ:0,outA:0};stock[t].inQ+=Number(b.qty);stock[t].inA+=Number(b.amount);});
  DB.bookout.forEach(b=>{const t=b.title;stock[t]=stock[t]||{inQ:0,inA:0,outQ:0,outA:0};stock[t].outQ+=Number(b.qty);stock[t].outA+=Number(b.amount);});

    <div class="toolbar" style="margin-bottom:${sel?'12px':'0'}">

        ${titles.map(t=>`<option ${sel===t?'selected':''}>${esc(t)}</option>`).join("")}
      </select>
    </div>
    ${sel?`<div class="cards">
      <div class="card"><div class="lab">입고수량</div><div class="val">${q.inQ}권</div></div>
      <div class="card"><div class="lab">입고금액</div><div class="val">${won(q.inA)}원</div></div>
      <div class="card"><div class="lab">출고수량</div><div class="val">${q.outQ}권</div></div>

    </div>`:""}
  </div>`;

  titles.forEach(t=>{const x=stock[t];tot.inQ+=x.inQ;tot.inA+=x.inA;tot.outQ+=x.outQ;tot.outA+=x.outA;tot.rem+=x.inQ-x.outQ;});
  const pgS=paginate(titles,ui.bookPage.stock,10);
  const stockRows=pgS.rows.map(t=>{
    const x=stock[t],rem=x.inQ-x.outQ;

  }).join("");
  return `${quick}
  <div class="panel"><h2><span>재고 현황 (자동 집계 · 총 ${titles.length}종)</span><button class="btn sm" onclick="printStock()">🖨 재고조사표 인쇄 (A4)</button></h2>
    <div style="overflow:auto"><table><thead><tr><th>교재명</th><th>입고수량</th><th>입고금액</th><th>출고수량</th><th>출고금액</th><th>잔여재고</th></tr></thead>
    <tbody>${stockRows||`<tr><td colspan="6" class="empty">‘입고 기록’ 탭에서 교재를 등록하면 재고가 자동 집계됩니다.</td></tr>`}
    ${titles.length?`<tr style="background:var(--green-light)"><td><b>전체 합계</b></td><td><b>${tot.inQ}</b></td><td><b>${won(tot.inA)}원</b></td><td><b>${tot.outQ}</b></td><td><b>${won(tot.outA)}원</b></td><td><b>${tot.rem}권</b></td></tr>`:""}
    </tbody></table></div>
    ${pagerHtml('stock',pgS)}
    <p class="note">※ 잔여재고 2권 이하는 빨간색. 화면은 10행씩 페이지로 표시되며, 인쇄 시 전체가 출력됩니다.</p>
  </div>`;
}

function viewBook(){

function addBookIn(){
  const tt=val("b_tt").trim(),bp=num("b_bp"),q=num("b_q");
  if(!tt||!q){alert("교재명과 권수는 필수입니다. (견본은 정가·구입가 0원으로 입력)");return;}
  DB.bookin.push({id:uid(),date:val("b_dt"),subject:val("b_sj"),vendor:val("b_vd"),title:tt,listPrice:num("b_lp"),buyPrice:bp,qty:q,amount:bp*q,note:bp===0?"견본":""});
  save();render();
}
function delBookIn(id){if(confirm("이 입고 기록을 삭제할까요? (재고에 반영됩니다)")){DB.bookin=DB.bookin.filter(x=>String(x.id)!==String(id));save();render();}}
function addBookOut(){
  const tt=val("o_tt"),q=num("o_q"),pr=num("o_pr");
  if(!tt||!q){alert("교재명과 권수는 필수입니다.");return;}
  const sIn=DB.bookin.filter(b=>b.title===tt).reduce((a,b)=>a+Number(b.qty),0);
  const sOut=DB.bookout.filter(b=>b.title===tt).reduce((a,b)=>a+Number(b.qty),0);
  if(sIn-sOut<q && !confirm(`잔여재고(${sIn-sOut}권)보다 많은 수량입니다. 그래도 기록할까요?`))return;
  DB.bookout.push({id:uid(),date:val("o_dt"),name:val("o_nm"),title:tt,price:pr,qty:q,amount:pr*q,note:val("o_no")});
  save();render();
}
function delBookOut(id){if(confirm("이 출고 기록을 삭제할까요? (재고에 반영됩니다)")){DB.bookout=DB.bookout.filter(x=>String(x.id)!==String(id));save();render();}}

const LEAD_SOURCES=["블로그","전화","방문","지인소개","인터넷검색","SNS","현수막/전단","기타"];
const LEAD_STATUS=["신규","상담중","재연락","등록완료","미등록"];
function leadStatusColor(st){return st==="등록완료"?"ok":(st==="미등록"?"no":(st==="재연락"?"warn":""));}

  if(f!=="전체")list=list.filter(l=>l.status===f);

  const today=todayStr();
  const recalls=DB.leads.filter(l=>l.recallDate&&l.status!=="등록완료"&&l.status!=="미등록"&&String(l.recallDate)<=today);
  const cnt=k=>DB.leads.filter(l=>l.status===k).length;

  <div class="toolbar">
    <div class="card" style="padding:10px 14px"><span class="lab">전체 상담 </span><b>${DB.leads.length}건</b></div>
    <div class="card" style="padding:10px 14px"><span class="lab">등록 전환 </span><b style="color:var(--green)">${cnt("등록완료")}건 (${convRate}%)</b></div>
    <div class="card" style="padding:10px 14px"><span class="lab">재연락 예정 </span><b class="${recalls.length?'neg':''}">${recalls.length}명</b></div>
  </div>
  ${recalls.length?`<div class="panel" style="border-left:3px solid var(--amber)"><h2>🔔 오늘까지 재연락 예정 (${recalls.length}명)</h2>
    <div class="twrap" style="border:none"><table><thead><tr><th>재연락일</th><th>성명</th><th>연락처</th><th>관심과정</th><th>상담내용</th></tr></thead><tbody>
    ${recalls.map(l=>`<tr><td>${esc(l.recallDate)}</td><td><b>${esc(l.name)}</b></td><td>${esc(l.phone)}</td><td>${esc(l.course)}</td><td>${esc(l.content)}</td></tr>`).join("")}
    </tbody></table></div></div>`:""}
  <div class="formbox">
    <label class="fld">상담일<input type="date" id="ld_dt" value="${today}"></label>
    <label class="fld">성명<input id="ld_nm" placeholder="문의자 이름"></label>
    <label class="fld">연락처<input id="ld_ph" placeholder="010-..."></label>
    <label class="fld">문의경로<select id="ld_src">${getSources().map(x=>`<option>${esc(x)}</option>`).join("")}</select></label>
    <label class="fld">관심과정<select id="ld_co"><option value=""></option>${courseNames().map(c=>`<option>${esc(c)}</option>`).join("")}</select></label>
    <label class="fld">담당자<select id="ld_staff">${getTeachers().map(t=>`<option>${esc(t)}</option>`).join("")}</select></label>
    <label class="fld">재연락일<input type="date" id="ld_recall"></label>
    <label class="fld" style="grid-column:span 2">상담내용<input id="ld_ct" placeholder="예: 컴활2급 야간반 문의, 수강료 안내함"></label>
    <button class="btn" onclick="addLead()">상담 등록</button>
  </div>
  <div class="toolbar">
    <span style="font-size:13px;color:var(--sub)">상태 필터:</span>
    ${["전체",...LEAD_STATUS].map(st=>`<button class="btn sm ${f===st?'on':''}" onclick="ui.leadFilter='${st}';render()">${st}${st!=="전체"?` ${cnt(st)}`:""}</button>`).join("")}
  </div>
  <div class="twrap"><table><thead><tr><th>상담일</th><th>성명</th><th>연락처</th><th>문의경로</th><th>관심과정</th><th>상담내용</th><th>재연락일</th><th>담당</th><th>상태</th><th>작업</th></tr></thead><tbody>
  ${list.length?list.map(l=>{
    const editing=String(ui.leadEditId)===String(l.id);
    if(editing){
      return `<tr style="background:var(--green-light)">
        <td><input type="date" id="le_dt" value="${esc(l.date)}" style="padding:4px"></td>
        <td><input id="le_nm" value="${esc(l.name)}" style="padding:4px;width:70px"></td>
        <td><input id="le_ph" value="${esc(l.phone)}" style="padding:4px;width:100px"></td>
        <td><select id="le_src" style="padding:4px">${getSources().map(x=>`<option ${l.source===x?'selected':''}>${esc(x)}</option>`).join("")}</select></td>

        <td><input type="date" id="le_recall" value="${esc(l.recallDate)}" style="padding:4px"></td>

    <td style="white-space:nowrap">${converted?`<span style="font-size:11px;color:var(--sub)">수강생 전환됨</span>`:`<button class="btn sm" style="background:var(--green);color:#fff;border:none" onclick="convertLead('${l.id}')" title="수강생으로 등록">▶ 등록전환</button> `}<button class="btn sm" onclick="ui.leadEditId='${l.id}';render()">✎</button> <button class="btn sm" onclick="delLead('${l.id}')">🗑</button></td></tr>`;
  }).join(""):`<tr><td colspan="10" class="empty">상담 내역이 없습니다. 위에서 신규 문의를 등록하세요.</td></tr>`}
  </tbody></table></div>
  <p class="note">※ ‘등록전환’을 누르면 상담자가 수강생으로 등록되고, 수강생관리 탭에서 이어서 과정·수강료를 입력할 수 있습니다.</p>`;
}
function addLead(){
  const nm=val("ld_nm").trim();
  if(!nm){alert("성명을 입력하세요.");return;}
  DB.leads.push({id:uid(),date:val("ld_dt"),name:nm,phone:val("ld_ph"),source:val("ld_src"),course:val("ld_co"),content:val("ld_ct"),status:"신규",recallDate:val("ld_recall"),staff:val("ld_staff"),convertedSid:"",note:""});
  save();render();
}
function saveLead(id){
  const l=DB.leads.find(x=>String(x.id)===String(id));if(!l)return;
  l.date=val("le_dt");l.name=val("le_nm").trim();l.phone=val("le_ph");l.source=val("le_src");l.course=val("le_co");l.content=val("le_ct");l.recallDate=val("le_recall");l.staff=val("le_staff");l.status=val("le_st");
  ui.leadEditId=null;save();render();
}
function delLead(id){
  if(!confirm("이 상담 내역을 삭제할까요?"))return;
  DB.leads=DB.leads.filter(x=>String(x.id)!==String(id));save();render();
}
function convertLead(id){
  const l=DB.leads.find(x=>String(x.id)===String(id));if(!l)return;
  if(!confirm(`'${l.name}'님을 수강생으로 등록할까요?\n\n등록 후 수강생관리 탭에서 과정·수강료 등을 입력하세요.`))return;
  const sid=uid();
  DB.students.push({id:sid,name:l.name,gubun:"성인",phone:l.phone,guardian:"",birth:"",gender:"",school:"",grade:"",teacher:l.staff||"원장",course:l.course||"",start:todayStr(),tuition:0,payCycle:"",cycleMonths:1,totalSessions:0,charged:0,classDays:"",quitDate:"",lastPaid:"",status:"재원",note:`상담 전환 (${l.date} ${l.source})`});
  l.status="등록완료";l.convertedSid=sid;
  save();
  ui.detailId=sid;tab="stu";render();
  alert(`'${l.name}'님이 수강생으로 등록되었습니다.\n과정·수강료를 입력해 주세요.`);
}
function viewPay(){
  const today=todayStr();
  // 카드 미입금 = 카드결제인데 입금일이 비어있는 건
  const unpaid=DB.sales.filter(l=>Number(l.paidAmount)>0 && l.method==="카드" && !normDate(l.depositDate))
    .sort((a,b)=>String(a.date).localeCompare(String(b.date)));
  const unpaidSum=unpaid.reduce((a,l)=>a+Number(l.paidAmount),0);
  const refunds=DB.sales.filter(l=>Number(l.paidAmount)<0).sort((a,b)=>String(b.date).localeCompare(String(a.date)));
  const refundSum=refunds.reduce((a,l)=>a+Number(l.paidAmount),0);
  const settleDate=l=>l.method==="카드"?normDate(l.depositDate):normDate(l.date);
  const isSettled=l=>l.method==="카드"?!!normDate(l.depositDate):true;
  const paidThis=DB.sales.filter(l=>Number(l.paidAmount)>0 && isSettled(l) && settleDate(l).startsWith(ui.salesMonth));
  const paidSum=paidThis.reduce((a,l)=>a+Number(l.depositAmount||l.paidAmount),0);
  const daysOver=d=>{const dt=new Date(normDate(d)+"T00:00:00");return Math.floor((new Date(today+"T00:00:00")-dt)/86400000);};
  // 오늘 납입내역 (결제일이 오늘인 건)
  const todayPaid=DB.sales.filter(l=>Number(l.paidAmount)>0 && normDate(l.date)===today).sort((a,b)=>String(b.id).localeCompare(String(a.id)));
  const todaySum=todayPaid.reduce((a,l)=>a+Number(l.paidAmount),0);
  // 수강료 재결제 임박
  const active=DB.students.filter(s=>s.status!=="퇴원");
  const dueSoon=active.map(s=>({s,info:nextDueInfo(s)})).filter(x=>
    (x.info.type==="count"&&x.info.remain<=2)||(x.info.type==="date"&&x.info.dday<=7)
  ).sort((a,b)=>{const av=a.info.type==="date"?a.info.dday:a.info.remain;const bv=b.info.type==="date"?b.info.dday:b.info.remain;return av-bv;});
  return `
  <div class="toolbar">
    <div class="card" style="padding:10px 14px"><span class="lab">오늘 납입 </span><b style="color:var(--green)">${won(todaySum)}원</b></div>
    <div class="card" style="padding:10px 14px"><span class="lab">카드 미입금 </span><b class="${unpaid.length?'neg':''}">${unpaid.length}건 / ${won(unpaidSum)}원</b></div>
    <div class="card" style="padding:10px 14px"><span class="lab">${ui.salesMonth} 수납액 </span><b style="color:var(--green)">${won(paidSum)}원</b></div>
    <label class="fld">기준 월<input type="month" value="${ui.salesMonth}" onchange="ui.salesMonth=this.value;render()"></label>
  </div>

  <div class="panel"><h2>📅 오늘 납입내역 (${today} · ${todayPaid.length}건)</h2>
    ${todayPaid.length?`<div class="twrap" style="border:none"><table><thead><tr><th>성명</th><th>과정</th><th>결제수단</th><th>금액</th><th>입금상태</th></tr></thead><tbody>
    ${todayPaid.map(l=>`<tr><td><b>${esc(l.name)}</b></td><td>${esc(l.course)}</td><td>${esc(l.method)}</td><td style="font-weight:bold">${won(l.paidAmount)}원</td><td>${isSettled(l)?'<span class="pill ok">입금완료</span>':'<span class="pill warn">카드 대기</span>'}</td></tr>`).join("")}
    <tr style="background:var(--green-light)"><td colspan="3" style="text-align:right"><b>오늘 합계</b></td><td style="font-weight:bold;color:var(--green)">${won(todaySum)}원</td><td></td></tr>
    </tbody></table></div>`:`<div class="empty">오늘 납입된 내역이 없습니다.</div>`}
  </div>

  <div class="panel"><h2>💳 카드 미입금현황 (${unpaid.length}건)</h2>
    ${unpaid.length?`<div class="twrap" style="border:none"><table><thead><tr><th>결제일</th><th>경과일</th><th>성명</th><th>과정</th><th>카드사</th><th>미입금액</th><th>입금 처리</th></tr></thead><tbody>
    ${unpaid.map(l=>{const od=daysOver(l.date);return `<tr><td>${esc(l.date)}</td><td><span class="pill ${od>=7?'no':(od>=4?'warn':'')}">${od}일</span></td><td><b>${esc(l.name)}</b></td><td>${esc(l.course)}</td><td>${esc(l.cardCo)}</td><td style="color:var(--red);font-weight:bold">${won(l.paidAmount)}원</td>
    <td><button class="btn sm" style="background:var(--green);color:#fff;border:none" onclick="payQuickDeposit('${l.id}')">💰 입금완료</button></td></tr>`;}).join("")}
    <tr style="background:#fff4f4"><td colspan="5" style="text-align:right"><b>미입금 총액</b></td><td style="color:var(--red);font-weight:bold">${won(unpaidSum)}원</td><td></td></tr>
    </tbody></table></div>`:`<div class="empty">카드 미입금 건이 없습니다. 👍</div>`}
    <p class="note">※ <b>카드 결제</b>만 입금일 확인이 필요합니다(승인 후 며칠 뒤 입금). 계좌이체·현금은 결제일에 바로 수납 완료됩니다. 카드 입금이 확인되면 ‘입금완료’를 누르세요.</p>
  </div>

  <div class="panel"><h2>↩ 환불 내역 (누적 ${refunds.length}건)</h2>
    ${refunds.length?`<div class="twrap" style="border:none"><table><thead><tr><th>환불일</th><th>성명</th><th>과정</th><th>환불액</th><th>비고</th></tr></thead><tbody>
    ${refunds.map(l=>`<tr><td>${esc(l.date)}</td><td>${esc(l.name)}</td><td>${esc(l.course)}</td><td style="color:var(--red)">${won(l.paidAmount)}원</td><td>${esc(l.note)}</td></tr>`).join("")}
    <tr style="background:#fff4f4"><td colspan="3" style="text-align:right"><b>환불 합계</b></td><td style="color:var(--red);font-weight:bold">${won(refundSum)}원</td><td></td></tr>
    </tbody></table></div>`:`<div class="empty">환불 내역이 없습니다.</div>`}
    <p class="note">※ 환불은 수강료 납입내역에서 결제금액을 음수로 입력하면 자동 집계됩니다 (횟수제는 충전횟수도 차감).</p>
  </div>

  <div class="panel"><h2>🖨 수납대장 출력</h2>
    <div class="toolbar" style="margin-bottom:8px">
      <label class="fld">시작일<input type="date" id="ledgStart" value="${ui.ledgStart||(ui.salesMonth+'-01')}"></label>
      <label class="fld">종료일<input type="date" id="ledgEnd" value="${ui.ledgEnd||(ui.salesMonth+'-31')}"></label>
      <button class="btn" onclick="printPayLedger()">🖨 기간 수납대장 인쇄 (A4)</button>
    </div>
    <p class="note" style="margin:0">결제일 기준으로 작성됩니다. 카드는 입금일·입금액·수수료가 함께 표시됩니다.</p>
  </div>

  <div class="panel"><h2><span>📒 ${ui.ledgerYear}년 장부 현황</span>
    <span><button class="btn sm" onclick="ledYearMove(-1)">◀ ${Number(ui.ledgerYear)-1}년</button> <button class="btn sm" onclick="ledYearMove(1)">${Number(ui.ledgerYear)+1}년 ▶</button></span></h2>
    <p class="note" style="margin:0">수강료 납입내역·수입내역·지출내역에 입력된 기록이 자동 집계됩니다.</p>
  </div>
  ${ledgerChartHtml(ui.ledgerYear)}
  ${pivotHtml("월별 매출 현황 (결제수단별)",yearPivot(DB.sales,it=>it.method,it=>Number(it.paidAmount),SALE_METHODS,ui.ledgerYear))}
  ${pivotHtml("월별 수입 현황 (계정과목별)",yearPivot(DB.income,it=>it.acct,it=>Number(it.amount),Object.values(getIncCat()).flat(),ui.ledgerYear))}
  ${pivotHtml("월별 지출 현황 (대분류별)",yearPivot(DB.expense,it=>it.big,it=>Number(it.paidAmount)||Number(it.amount),Object.keys(getExpCat()),ui.ledgerYear))}`;
}
function payQuickDeposit(id){
  const l=DB.sales.find(x=>String(x.id)===String(id));if(!l)return;
  if(!confirm(`'${l.name}'님 ${won(l.paidAmount)}원을 오늘(${todayStr()}) 입금완료 처리할까요?`))return;
  l.depositDate=todayStr();
  if(!l.depositAmount)l.depositAmount=l.paidAmount;
  save();render();
}
function printPayLedger(){
  const start=val("ledgStart"), end=val("ledgEnd");
  if(!start||!end){alert("시작일과 종료일을 선택하세요.");return;}
  ui.ledgStart=start;ui.ledgEnd=end;
  // 결제일 기준으로 기간 내 매출(양수)만, 결제일순 정렬
  const inRange=l=>{const d=normDate(l.date);return d>=start&&d<=end;};
  const paid=DB.sales.filter(l=>Number(l.paidAmount)>0 && inRange(l)).sort((a,b)=>normDate(a.date).localeCompare(normDate(b.date)));
  // 합계
  let totPaid=0,totDep=0,totFee=0;
  const rows=paid.map((l,i)=>{
    const isCard=l.method==="카드";
    const dep=isCard?Number(l.depositAmount||0):Number(l.paidAmount);
    const fee=isCard?Number(l.fee||0):0;
    const depDate=isCard?(normDate(l.depositDate)||'<span style="color:#c00">미입금</span>'):normDate(l.date);
    totPaid+=Number(l.paidAmount);totDep+=dep;totFee+=fee;
    return `<tr>
      <td style="text-align:center">${i+1}</td>
      <td>${esc(normDate(l.date))}</td>
      <td>${esc(l.name)}</td>
      <td>${esc(l.course)}</td>
      <td style="text-align:center">${esc(l.method)}</td>
      <td style="text-align:right">${won(l.paidAmount)}</td>
      <td style="text-align:center">${depDate}</td>
      <td style="text-align:right">${dep?won(dep):"-"}</td>
      <td style="text-align:right">${fee?won(fee):"-"}</td>
    </tr>`;
  }).join("");
  const html=`<!doctype html><html><head><meta charset="utf-8"><title>수납대장</title>
  <style>@page{size:A4 landscape;margin:14mm}body{font-family:'Malgun Gothic',sans-serif;color:#000}
  h1{text-align:center;font-size:20px;margin:0 0 4px}.info{text-align:right;font-size:12px;margin-bottom:10px}
  table{width:100%;border-collapse:collapse;font-size:12.5px}th,td{border:1px solid #000;padding:6px 7px}th{background:#eee}
  tfoot td{font-weight:bold;background:#f5f5f5}</style></head><body>
  <h1>제이컴퓨터학원 수납대장</h1>
  <div class="info">기간: ${start} ~ ${end} (결제일 기준) &nbsp;|&nbsp; 출력일: ${todayStr()}</div>
  <table>
    <thead><tr>
      <th style="width:5%">No</th><th style="width:11%">결제일</th><th>성명</th><th>과정</th>
      <th style="width:9%">결제수단</th><th style="width:12%">결제액</th>

function addCatBig(key,bigId){
  const big=val(bigId).trim();
  if(!big){alert("새 대분류 이름을 입력하세요.");return;}
  const v=big+"|기타";
  if(DB.settings.some(x=>x.key===key&&x.value===v)){alert("이미 있는 대분류입니다.");return;}
  DB.settings.push({id:uid(),key:key,value:v});
  save();render();
}
function hideCat(kind,big,acct){
  const catKey=kind==="inc"?"incCat":"expCat";
  const hideKey=kind==="inc"?"incHide":"expHide";
  const v=big+"|"+acct;
  if(!confirm(`'${big} › ${acct}' 계정과목을 삭제할까요?\n(기존 기록은 그대로 유지됩니다)`))return;
  const added=DB.settings.find(x=>x.key===catKey&&x.value===v);
  if(added){DB.settings=DB.settings.filter(x=>x.id!==added.id);}
  else{if(!DB.settings.some(x=>x.key===hideKey&&x.value===v))DB.settings.push({id:uid(),key:hideKey,value:v});}
  save();render();
}
function delCatBig(kind,big){
  const cats=kind==="inc"?getIncCat():getExpCat();
  const accts=cats[big]||[];
  if(!confirm(`'${big}' 대분류 전체(계정과목 ${accts.length}개)를 삭제할까요?\n(기존 기록은 그대로 유지됩니다)`))return;
  const catKey=kind==="inc"?"incCat":"expCat";
  const hideKey=kind==="inc"?"incHide":"expHide";
  accts.forEach(acct=>{
    const v=big+"|"+acct;
    const added=DB.settings.find(x=>x.key===catKey&&x.value===v);
    if(added){DB.settings=DB.settings.filter(x=>x.id!==added.id);}
    else{if(!DB.settings.some(x=>x.key===hideKey&&x.value===v))DB.settings.push({id:uid(),key:hideKey,value:v});}
  });
  save();render();
}

function viewWork(writer){

    const day=Math.min(Number(String(t.date).slice(8,10)),dim);

function printAssetReport(key){
  const def=ASSET_DEFS[key];
  const fy=ui.assetFY||"", fm=ui.assetFM||"";
  let list=[...DB[key]].sort((a,b)=>String(a.date||a.buyDate||"").localeCompare(String(b.date||b.buyDate||"")));

    list=list.filter(x=>{

      if(fm&&d.slice(5,7)!==fm)return false;
      return true;

  const period=fy?`${fy}년${fm?" "+Number(fm)+"월":" 전체"}`:"전체 기간";
  const totPrice=key!=="facilities"?list.reduce((a,x)=>a+(Number(x.price)*(Number(x.qty)||1)),0):0;
